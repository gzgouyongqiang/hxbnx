<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>炼金试炼 · 关卡总图 | 化学不难学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e17;--card:#1a1a2e;--card2:#16213e;
  --gold:#f0c040;--gold-dim:#c9a020;--silver:#c0c8d8;--bronze:#d4a574;
  --purple:#a78bfa;--green:#6ee7b7;--blue:#67e8f9;--rose:#f472b6;
  --text:#e2e8f0;--text-dim:#94a3b8;--red:#f87171;--border:#2d2d44;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;overflow-x:hidden;
}

/* Particles */
.bg-particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-particles .p{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);animation:floatUp 6s ease-in infinite;opacity:0}
.bg-particles .p:nth-child(odd){background:var(--purple)}
.bg-particles .p:nth-child(3n){background:var(--blue)}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.5}90%{opacity:.5}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}

/* Layout */
.wrapper{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 20px 60px}

/* Hero */
.hero{text-align:center;padding:48px 20px 28px;position:relative}
.hero::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(240,192,64,0.06) 0%,transparent 70%);pointer-events:none}
.hero-title{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--gold) 0%,var(--purple) 50%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.hero-sub{color:var(--text-dim);font-size:14px;margin-bottom:24px}
.hero-stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.hero-stat{background:linear-gradient(135deg,rgba(26,26,46,.8),rgba(22,33,62,.8));border:1px solid var(--border);border-radius:14px;padding:12px 24px;min-width:100px;backdrop-filter:blur(12px)}
.hero-stat-num{font-size:26px;font-weight:800;color:var(--gold)}
.hero-stat-label{font-size:11px;color:var(--text-dim);margin-top:2px}

/* Legend */
.legend{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding:10px 16px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.legend-dot.bronze-g{background:linear-gradient(135deg,#d4a574,#b8865e)}
.legend-dot.silver-g{background:linear-gradient(135deg,#c0c8d8,#9aa0b0)}
.legend-dot.gold-g{background:linear-gradient(135deg,#f0c040,#c9a020)}
.legend-dot.locked-g{background:var(--border);border:1px dashed var(--text-dim)}
.legend-dot.side-g{background:linear-gradient(135deg,#e94560,#c0392b)}
.legend-dot.cleared-g{background:var(--green);box-shadow:0 0 6px rgba(110,231,183,.3)}

/* Toolbar */
.toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px}
.toolbar-btn{font-size:12px;color:var(--text-dim);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 12px;cursor:pointer;transition:all .2s}
.toolbar-btn:hover{color:var(--text);border-color:var(--purple)}

/* ===== Chapter ===== */
.chapter{margin-bottom:6px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--card);transition:border-color .3s}
.chapter:first-child{margin-top:0}
.chapter:hover{border-color:rgba(167,139,250,.2)}
.chapter-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .2s}
.chapter-header:hover{background:rgba(167,139,250,.04)}
.chapter-icon{font-size:22px;flex-shrink:0}
.chapter-info{flex:1;min-width:0}
.chapter-title{font-size:14px;font-weight:700;line-height:1.3}
.chapter-progress{display:flex;align-items:center;gap:8px;flex-shrink:0}
.progress-bar{width:80px;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease;background:linear-gradient(90deg,var(--purple),var(--blue))}
.progress-fill.complete{background:linear-gradient(90deg,var(--green),var(--blue))}
.progress-text{font-size:11px;color:var(--text-dim);white-space:nowrap;min-width:32px;text-align:right}
.chapter-arrow{font-size:12px;color:var(--text-dim);transition:transform .3s ease;flex-shrink:0}
.chapter.open .chapter-arrow{transform:rotate(90deg)}

/* Chapter body collapse */
.chapter-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.chapter.open .chapter-body{max-height:2000px}

/* ===== Course Grid ===== */
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:6px;padding:4px 14px 10px}
.course-sq{
  aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;transition:all .2s ease;background:var(--card2);border:1.5px solid var(--border);position:relative;
}
.course-sq:hover{transform:translateY(-2px);border-color:var(--purple)}
.course-sq.active{border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,64,.15)}
.sq-num{font-size:16px;font-weight:800;color:var(--text);line-height:1}
.sq-dots{display:flex;gap:2px}
.sq-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.08)}
.sq-dot.b-on{background:var(--bronze);box-shadow:0 0 3px rgba(212,165,116,.3)}
.sq-dot.s-on{background:var(--silver);box-shadow:0 0 3px rgba(192,200,216,.3)}
.sq-dot.g-on{background:var(--gold);box-shadow:0 0 4px rgba(240,192,64,.4)}

/* Square states */
.course-sq.all-cleared{border-color:rgba(110,231,183,.35)}
.course-sq.all-cleared .sq-num{color:var(--green)}
.course-sq.partial-cleared{border-color:rgba(240,192,64,.25)}
.course-sq.has-content:not(.partial-cleared):not(.all-cleared){animation:sqGlow 3s ease-in-out infinite}
.course-sq.no-content{opacity:.25;cursor:default}
.course-sq.no-content:hover{transform:none;border-color:var(--border)}
@keyframes sqGlow{0%,100%{border-color:rgba(167,139,250,.2)}50%{border-color:rgba(167,139,250,.45)}}

/* ===== Course Detail ===== */
.course-detail{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .3s;opacity:0}
.course-detail.open{max-height:300px;opacity:1}
.detail-wrap{padding:8px 14px 14px}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 2px}
.detail-course-num{font-size:16px;font-weight:800;color:var(--purple)}
.detail-course-title{font-size:13px;color:var(--text-dim)}
.detail-cards{display:flex;gap:10px}
.detail-card{
  flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;
  padding:14px 10px;text-decoration:none;color:var(--text);transition:all .25s ease;
  display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;
}
.detail-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.detail-card.locked{opacity:.3;cursor:not-allowed;pointer-events:none}
.detail-card.bronze{border-color:rgba(212,165,116,.2)}
.detail-card.bronze:hover{border-color:var(--bronze);box-shadow:0 6px 20px rgba(212,165,116,.1)}
.detail-card.silver{border-color:rgba(192,200,216,.2)}
.detail-card.silver:hover{border-color:var(--silver);box-shadow:0 6px 20px rgba(192,200,216,.1)}
.detail-card.gold{border-color:rgba(240,192,64,.25);background:linear-gradient(135deg,rgba(240,192,64,.02),var(--card2))}
.detail-card.gold:hover{border-color:var(--gold);box-shadow:0 6px 20px rgba(240,192,64,.12)}
.detail-medal{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.detail-medal.bronze-m{background:linear-gradient(135deg,#d4a574,#b8865e);box-shadow:0 3px 10px rgba(212,165,116,.3)}
.detail-medal.silver-m{background:linear-gradient(135deg,#c0c8d8,#9aa0b0);box-shadow:0 3px 10px rgba(192,200,216,.3)}
.detail-medal.gold-m{background:linear-gradient(135deg,#f0c040,#c9a020);box-shadow:0 3px 14px rgba(240,192,64,.4)}
.detail-medal.locked-m{background:var(--card);border:2px dashed var(--border);color:var(--text-dim)}
.detail-tier{font-size:13px;font-weight:700}
.detail-points{font-size:11px;color:var(--text-dim)}
.detail-status{font-size:10px;padding:1px 8px;border-radius:6px}
.detail-status.cleared{background:rgba(110,231,183,.12);color:var(--green)}
.detail-status.waiting{background:rgba(148,163,184,.08);color:var(--text-dim)}
.detail-coming{text-align:center;padding:16px;color:var(--text-dim);font-size:13px}
.detail-coming-icon{font-size:28px;margin-bottom:6px}

/* ===== Side Quests ===== */
.side-section{margin-top:32px;padding-top:24px;border-top:2px solid var(--border)}
.side-section h2{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:14px;text-align:center}
.side-board{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.side-card{
  background:linear-gradient(135deg,rgba(233,69,96,.06),var(--card));border:1.5px solid #e94560;border-radius:14px;
  padding:16px;width:260px;text-decoration:none;color:var(--text);transition:all .3s;overflow:hidden;position:relative;
}
.side-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(233,69,96,.15)}
.side-card.locked-side{opacity:.45;border-color:var(--border);background:var(--card);cursor:not-allowed}
.side-card.locked-side:hover{transform:none;box-shadow:none}
.side-card.expired-side{opacity:.25;border-color:var(--border);background:var(--card);filter:grayscale(.6)}
.side-card-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.side-card-icon{font-size:22px}
.side-card-title{font-size:15px;font-weight:700}
.side-card-sub{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.side-card-reward{font-size:11px;color:var(--gold)}
.side-card-badge{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;border-radius:6px}
.side-card-badge.urgent{background:#e94560;color:#fff;animation:pulse 1.5s ease-in-out infinite}
.side-card-badge.locked-tag{background:var(--border);color:var(--text-dim)}
.side-card-badge.done{background:rgba(110,231,183,.15);color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.board-section{margin-top:16px;text-align:center}
.board-section summary{display:inline-block;color:var(--text-dim);font-size:12px;cursor:pointer;padding:6px 16px;border:1px dashed var(--border);border-radius:8px;transition:all .2s;list-style:none}
.board-section summary:hover{color:var(--text);border-color:var(--text-dim)}
.board-section summary::-webkit-details-marker{display:none}
.board-hidden{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.board-hidden .side-card{width:200px;padding:12px;font-size:12px}

/* Footer */
.footer{text-align:center;padding:32px 20px;color:var(--text-dim);font-size:12px;border-top:1px solid var(--border);margin-top:24px}

/* Responsive */
@media(max-width:640px){
  .course-grid{grid-template-columns:repeat(auto-fill,minmax(48px,1fr))}
  .hero-title{font-size:26px}
  .hero-stats{gap:12px}
  .hero-stat{padding:10px 16px;min-width:80px}
  .hero-stat-num{font-size:22px}
  .detail-cards{flex-direction:column}
  .chapter-progress{gap:4px}
  .progress-bar{width:50px}
  .chapter-icon{font-size:18px}
  .chapter-title{font-size:13px}
}
</style>
<script src="assets/game.js"></script>
</head>
<body>

<div class="bg-particles" id="bgParts"></div>

<div class="wrapper">

<div class="hero">
  <div class="hero-title">⚗️ 炼金试炼</div>
  <div class="hero-sub">关卡总图 · 68大关 · 6大章节 · 自由选择你的试炼之路</div>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num" id="totalScore">0</div><div class="hero-stat-label">💎 总积分</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="clearedCount">0</div><div class="hero-stat-label">🏆 已通关</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="totalLevels">0</div><div class="hero-stat-label">🗺️ 总关卡</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="badgeCount">0</div><div class="hero-stat-label">🏅 徽章</div></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot bronze-g"></span>🥉铜牌</div>
  <div class="legend-item"><span class="legend-dot silver-g"></span>🥈银牌</div>
  <div class="legend-item"><span class="legend-dot gold-g"></span>🥇金牌</div>
  <div class="legend-item"><span class="legend-dot cleared-g"></span>全通</div>
  <div class="legend-item"><span class="legend-dot locked-g"></span>待解锁</div>
  <div class="legend-item"><span class="legend-dot side-g"></span>分支副本</div>
</div>

<div class="toolbar" id="toolbar">
  <a href="profile.html" class="toolbar-btn" style="text-decoration:none;color:var(--gold);border-color:rgba(240,192,64,.3)">&#128100; 角色面板</a>
  <a href="wrong.html" class="toolbar-btn" style="text-decoration:none;color:var(--red);border-color:rgba(248,113,113,.3)">📖 错题本</a>
  <button class="toolbar-btn" onclick="toggleAll(true)">展开全部</button>
  <button class="toolbar-btn" onclick="toggleAll(false)">收起全部</button>
</div>

<div id="chapters"></div>
<div id="sideSection"></div>

<div class="footer">炼金试炼 · 化学不难学 | 坚持修炼，终成炼金大师 ⚗️</div>

</div>

<script>
(function(){
  var G = HXBNX_GAME;
  var tierNames = {bronze:'铜牌关',silver:'银牌关',gold:'金牌关'};
  var tierMedals = {bronze:'🥉',silver:'🥈',gold:'🥇'};
  var tierScores = {bronze:10,silver:50,gold:100};
  var TIER_ORDER = ['bronze','silver','gold'];
  var selectedCourse = null; // {chapterId, courseId}
  var openChapters = {};

  // BG particles
  var pc = document.getElementById('bgParts');
  for(var i=0;i<25;i++){
    var p=document.createElement('div');p.className='p';
    p.style.left=Math.random()*100+'%';
    p.style.animationDelay=Math.random()*6+'s';
    p.style.animationDuration=(4+Math.random()*8)+'s';
    pc.appendChild(p);
  }

  // Load data
  fetch('data/quests.json').then(function(r){return r.json()}).then(function(reg){
    var state = JSON.parse(localStorage.getItem('hxbnx_game_v2') || '{}');
    var cleared = state.clearedQuests || [];
    var score = state.score || 0;
    var questBadges = state.questBadges || {};
    var badgeCount = Object.keys(questBadges).length;

    // Count total levels with content
    var totalLevels = 0;
    for(var qid in reg.quests){
      if(reg.quests[qid].contentFile) totalLevels++;
    }

    document.getElementById('totalScore').textContent = score;
    document.getElementById('totalLevels').textContent = totalLevels;
    document.getElementById('badgeCount').textContent = badgeCount;

    // Build quest lookup: questId -> quest
    var questMap = {};
    for(var qid in reg.quests){
      questMap[qid] = reg.quests[qid];
    }

    // Group quests by course
    var courseQuests = {}; // courseId -> {bronze: questId, silver: questId, gold: questId}
    for(var qid in questMap){
      var q = questMap[qid];
      if(q.type === 'main'){
        var cn = q.course;
        if(!courseQuests[cn]) courseQuests[cn] = {};
        courseQuests[cn][q.tier] = qid;
      }
    }

    // Count cleared levels
    var clearedCount = 0;
    for(var i=0;i<cleared.length;i++){
      if(questMap[cleared[i]]) clearedCount++;
    }
    document.getElementById('clearedCount').textContent = clearedCount;

    // Check if a course has any quest content
    function courseHasContent(cn){
      return !!courseQuests[cn];
    }

    // Check cleared state for a course's tiers
    function courseClearState(cn){
      var qs = courseQuests[cn];
      if(!qs) return {b:false,s:false,g:false};
      return {
        b: cleared.indexOf(qs.bronze) >= 0,
        s: cleared.indexOf(qs.silver) >= 0,
        g: cleared.indexOf(qs.gold) >= 0
      };
    }

    // Render chapters
    var chapters = reg.chapters || [];
    var html = '';
    for(var ci=0; ci<chapters.length; ci++){
      var ch = chapters[ci];
      var chHtml = renderChapter(ch, reg.courses, courseQuests, cleared, ci === 0);
      html += chHtml;
    }
    document.getElementById('chapters').innerHTML = html;

    // Restore chapter open states
    var savedOpen = JSON.parse(localStorage.getItem('hxbnx_chapters') || '{}');
    for(var chId in savedOpen){
      if(savedOpen[chId]){
        var el = document.getElementById(chId);
        if(el) el.classList.add('open');
      }
    }

    // Side quests
    renderSideQuests(reg.sideQuests, cleared, questMap);

  }).catch(function(err){
    document.getElementById('chapters').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">加载失败: ' + err.message + '</div>';
  });

  function renderChapter(ch, courses, courseQuests, cleared, defaultOpen){
    var chId = ch.id;
    var cls = defaultOpen ? ' chapter open' : ' chapter';
    var h = '<div class="' + cls.trim() + '" id="' + chId + '">';
    h += '<div class="chapter-header" onclick="toggleChapter(\'' + chId + '\')">';
    h += '<span class="chapter-icon">' + ch.icon + '</span>';
    h += '<div class="chapter-info"><div class="chapter-title">' + ch.title + '</div></div>';
    h += '<div class="chapter-progress">';
    h += '<div class="progress-bar"><div class="progress-fill" data-ch="' + chId + '"></div></div>';
    h += '<span class="progress-text" data-chtxt="' + chId + '">0/' + ch.courses.length + '</span>';
    h += '</div>';
    h += '<span class="chapter-arrow">▸</span>';
    h += '</div>';
    h += '<div class="chapter-body">';
    h += '<div class="course-grid">';

    for(var i=0; i<ch.courses.length; i++){
      var cn = ch.courses[i];
      var cd = courses[cn] || {};
      var hasContent = !!courseQuests[cn];
      var bC = cleared.indexOf('main-'+cn+'-bronze') >= 0;
      var sC = cleared.indexOf('main-'+cn+'-silver') >= 0;
      var gC = cleared.indexOf('main-'+cn+'-gold') >= 0;
      var allCleared = bC && sC && gC;
      var partialCleared = bC || sC || gC;

      var sqCls = 'course-sq';
      if(allCleared) sqCls += ' all-cleared';
      else if(partialCleared) sqCls += ' partial-cleared';
      else if(hasContent) sqCls += ' has-content';
      else sqCls += ' no-content';

      h += '<div class="' + sqCls + '" data-cn="' + cn + '" data-chid="' + chId + '" onclick="selectCourse(\'' + chId + '\',' + cn + ')" title="' + (cd.title || '课时' + cn) + '">';
      h += '<div class="sq-num">' + cn + '</div>';
      h += '<div class="sq-dots">';
      h += '<span class="sq-dot' + (bC ? ' b-on' : '') + '"></span>';
      h += '<span class="sq-dot' + (sC ? ' s-on' : '') + '"></span>';
      h += '<span class="sq-dot' + (gC ? ' g-on' : '') + '"></span>';
      h += '</div>';
      h += '</div>';
    }

    h += '</div>'; // grid
    h += '<div class="course-detail" id="detail-' + chId + '"></div>';
    h += '</div>'; // body
    h += '</div>'; // chapter
    return h;
  }

  // Update chapter progress
  function updateProgress(){
    var savedOpen = JSON.parse(localStorage.getItem('hxbnx_chapters') || '{}');
    var state = JSON.parse(localStorage.getItem('hxbnx_game_v2') || '{}');
    var cleared = state.clearedQuests || [];
    document.querySelectorAll('.chapter').forEach(function(chEl){
      var chId = chEl.id;
      var courses = chEl.querySelectorAll('.course-sq');
      var clearedInCh = 0;
      var total = courses.length;
      courses.forEach(function(sq){
        var cn = sq.dataset.cn;
        var b = cleared.indexOf('main-'+cn+'-bronze') >= 0;
        var s = cleared.indexOf('main-'+cn+'-silver') >= 0;
        var g = cleared.indexOf('main-'+cn+'-gold') >= 0;
        if(b && s && g) clearedInCh++;
      });
      var pct = total > 0 ? Math.round(clearedInCh / total * 100) : 0;
      var fill = chEl.querySelector('[data-ch="' + chId + '"]');
      var txt = chEl.querySelector('[data-chtxt="' + chId + '"]');
      if(fill){ fill.style.width = pct + '%'; if(pct === 100) fill.classList.add('complete'); }
      if(txt) txt.textContent = clearedInCh + '/' + total;
    });
  }

  // Toggle chapter
  window.toggleChapter = function(chId){
    var el = document.getElementById(chId);
    if(!el) return;
    el.classList.toggle('open');
    var saved = JSON.parse(localStorage.getItem('hxbnx_chapters') || '{}');
    saved[chId] = el.classList.contains('open');
    localStorage.setItem('hxbnx_chapters', JSON.stringify(saved));
  };

  // Toggle all chapters
  window.toggleAll = function(open){
    document.querySelectorAll('.chapter').forEach(function(el){
      if(open) el.classList.add('open');
      else el.classList.remove('open');
    });
    var saved = {};
    document.querySelectorAll('.chapter').forEach(function(el){
      saved[el.id] = open;
    });
    localStorage.setItem('hxbnx_chapters', JSON.stringify(saved));
  };

  // Select course -> show detail
  window.selectCourse = function(chId, cn){
    // Remove previous active square
    document.querySelectorAll('.course-sq.active').forEach(function(el){ el.classList.remove('active'); });

    var sq = document.querySelector('.course-sq[data-cn="' + cn + '"][data-chid="' + chId + '"]');
    if(!sq || sq.classList.contains('no-content')) return;
    sq.classList.add('active');

    // If same course clicked again, close
    if(selectedCourse && selectedCourse.chapterId === chId && selectedCourse.courseId === cn){
      var detail = document.getElementById('detail-' + chId);
      if(detail) detail.classList.remove('open');
      sq.classList.remove('active');
      selectedCourse = null;
      return;
    }

    selectedCourse = {chapterId: chId, courseId: cn};

    // Close all other details
    document.querySelectorAll('.course-detail.open').forEach(function(el){
      if(el.id !== 'detail-' + chId) el.classList.remove('open');
    });

    // Build detail HTML
    fetch('data/quests.json').then(function(r){return r.json()}).then(function(reg){
      var cd = reg.courses[cn] || {};
      var state = JSON.parse(localStorage.getItem('hxbnx_game_v2') || '{}');
      var cleared = state.clearedQuests || [];

      var h = '<div class="detail-wrap">';
      h += '<div class="detail-header">';
      h += '<span class="detail-course-num">' + cn + '</span>';
      h += '<span class="detail-course-title">' + (cd.title || '课时' + cn) + (cd.subtitle ? ' · ' + cd.subtitle : '') + '</span>';
      h += '</div>';
      h += '<div class="detail-cards">';

      for(var ti=0; ti<TIER_ORDER.length; ti++){
        var tier = TIER_ORDER[ti];
        var qid = 'main-' + cn + '-' + tier;
        var isCleared = cleared.indexOf(qid) >= 0;
        var hasQuest = !!reg.quests[qid];
        var isUnlocked = hasQuest && (tier === 'bronze' || cleared.indexOf('main-' + cn + '-' + TIER_ORDER[ti-1]) >= 0);

        var cardCls = 'detail-card ' + tier + (isUnlocked ? '' : ' locked');
        var medalCls = isUnlocked ? tier + '-m' : 'locked-m';
        var statusCls = isCleared ? 'cleared' : (isUnlocked ? 'waiting' : '');
        var statusText = isCleared ? '✓ 已通关' : (isUnlocked ? '待挑战' : '待解锁');

        if(hasQuest && isUnlocked){
          h += '<a href="level.html?q=' + qid + '" class="' + cardCls + '">';
        } else {
          h += '<div class="' + cardCls + '">';
        }
        h += '<div class="detail-medal ' + medalCls + '">' + (isUnlocked ? tierMedals[tier] : '🔒') + '</div>';
        h += '<div class="detail-tier">' + tierNames[tier] + '</div>';
        h += '<div class="detail-points">+' + tierScores[tier] + ' 积分</div>';
        if(statusCls) h += '<div class="detail-status ' + statusCls + '">' + statusText + '</div>';
        if(hasQuest && isUnlocked){
          h += '</a>';
        } else {
          h += '</div>';
        }
      }

      h += '</div></div>';

      var detail = document.getElementById('detail-' + chId);
      if(detail){
        detail.innerHTML = h;
        // Force reflow then add open class for animation
        void detail.offsetHeight;
        detail.classList.add('open');
      }
    });
  };

  // Side quests rendering
  function renderSideQuests(sideQuests, cleared, questMap){
    if(!sideQuests) return;
    var items = [];
    for(var sqid in sideQuests){
      if(sideQuests.hasOwnProperty(sqid)){
        items.push({questId:sqid, def:sideQuests[sqid]});
      }
    }
    if(items.length === 0) return;

    var active = [], board = [];
    for(var i=0;i<items.length;i++){
      var state = calcSideState(items[i], cleared, new Date());
      if(state === 'unlocked' || state === 'cleared' || state === 'in_progress'){
        active.push({questId:items[i].questId, def:items[i].def, state:state});
      } else {
        board.push({questId:items[i].questId, def:items[i].def, state:state});
      }
    }

    var html = '';
    if(active.length > 0){
      html += '<div class="side-section"><h2>📜 分支副本</h2><div class="side-board">';
      for(var i=0;i<active.length;i++){
        html += renderSideCard(active[i].questId, active[i].def, active[i].state);
      }
      html += '</div></div>';
    }
    if(board.length > 0){
      html += '<div class="board-section"><details><summary>📋 悬赏任务板 (' + board.length + ')</summary><div class="board-hidden">';
      for(var i=0;i<board.length;i++){
        html += renderSideCard(board[i].questId, board[i].def, board[i].state);
      }
      html += '</div></details></div>';
    }
    document.getElementById('sideSection').innerHTML = html;
  }

  function calcSideState(sq, cleared, now){
    var def = sq.def;
    if(def.validUntil && new Date(def.validUntil) < now) return 'expired';
    if(cleared.indexOf(sq.questId) >= 0) return 'cleared';
    if(def.unlock){
      var u = def.unlock;
      if(u.minCourse !== undefined && u.minTier !== undefined){
        if(cleared.indexOf('main-'+u.minCourse+'-'+u.minTier) < 0) return 'locked';
      }
      if(u.triggerAchievement) return 'locked';
    }
    return 'unlocked';
  }

  function renderSideCard(qid, def, state){
    var isLocked = (state === 'locked' || state === 'expired');
    var cls = 'side-card';
    var badgeCls = '', badgeText = '';
    if(state === 'unlocked'){cls += '';badgeCls = 'urgent';badgeText = 'NEW';}
    else if(state === 'cleared'){cls += '';badgeCls = 'done';badgeText = '✓';}
    else if(state === 'expired'){cls += ' expired-side';badgeCls = 'locked-tag';badgeText = '已过期';}
    else{cls += ' locked-side';badgeCls = 'locked-tag';badgeText = '未解锁';}

    var icon = (def.theme && def.theme.icon) || '📜';
    var href = isLocked ? 'javascript:void(0)' : 'level.html?q=' + qid;
    var title = state === 'expired' ? (def.title + ' (已过期)') : def.title;

    var h = '<a href="' + href + '" class="' + cls + '" data-qid="' + qid + '">';
    if(badgeText) h += '<div class="side-card-badge ' + badgeCls + '">' + badgeText + '</div>';
    h += '<div class="side-card-header"><span class="side-card-icon">' + icon + '</span>';
    h += '<span class="side-card-title">' + title + '</span></div>';
    h += '<div class="side-card-sub">' + (def.subtitle || '') + '</div>';
    h += '<div class="side-card-reward">⭐ ' + (def.baseScore || 0) + ' 积分';
    if(def.xpMultiplier) h += ' (+' + Math.round((def.xpMultiplier-1)*100) + '% XP)';
    h += '</div>';
    if(def.validUntil && state !== 'expired'){
      var days = Math.ceil((new Date(def.validUntil) - new Date()) / 86400000);
      if(days > 0) h += '<div style="font-size:10px;color:#e94560;margin-top:3px">⏳ 剩余 ' + days + ' 天</div>';
    }
    h += '</a>';
    return h;
  }

  // Update progress after load
  setTimeout(updateProgress, 100);
})();
</script>
