<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>炼金试炼 · 关卡总图 | 化学不难学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0e17;--card:#1a1a2e;--card2:#16213e;--gold:#f0c040;--gold-dim:#c9a020;--silver:#c0c8d8;--bronze:#d4a574;--purple:#a78bfa;--green:#6ee7b7;--blue:#67e8f9;--rose:#f472b6;--text:#e2e8f0;--text-dim:#94a3b8;--red:#f87171;--border:#2d2d44}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;overflow-x:hidden}
.bg-particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-particles .p{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);animation:floatUp 6s ease-in infinite;opacity:0}
.bg-particles .p:nth-child(odd){background:var(--purple)}
.bg-particles .p:nth-child(3n){background:var(--blue)}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.6}90%{opacity:0.6}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}
.wrapper{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px 60px}
.hero{text-align:center;padding:60px 20px 36px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(240,192,64,0.08) 0%,transparent 70%);pointer-events:none}
.hero-title{font-size:40px;font-weight:800;background:linear-gradient(135deg,var(--gold) 0%,var(--purple) 50%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;position:relative}
.hero-sub{color:var(--text-dim);font-size:15px;margin-bottom:28px}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.hero-stat{background:linear-gradient(135deg,rgba(26,26,46,0.8),rgba(22,33,62,0.8));border:1px solid var(--border);border-radius:16px;padding:16px 28px;min-width:120px;backdrop-filter:blur(12px)}
.hero-stat-num{font-size:28px;font-weight:800;color:var(--gold)}
.hero-stat-label{font-size:12px;color:var(--text-dim);margin-top:4px}
.legend{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin:0 0 40px;padding:14px 20px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim)}
.legend-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0}
.legend-dot.bronze-g{background:linear-gradient(135deg,#d4a574,#b8865e);box-shadow:0 0 8px rgba(212,165,116,0.3)}
.legend-dot.silver-g{background:linear-gradient(135deg,#c0c8d8,#9aa0b0);box-shadow:0 0 8px rgba(192,200,216,0.3)}
.legend-dot.gold-g{background:linear-gradient(135deg,#f0c040,#c9a020);box-shadow:0 0 12px rgba(240,192,64,0.4)}
.legend-dot.locked-g{background:var(--border);border:1px dashed var(--text-dim)}
.legend-dot.side-g{background:linear-gradient(135deg,#e94560,#c0392b);box-shadow:0 0 8px rgba(233,69,96,0.3)}
.course-section{margin-bottom:36px}
.course-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:0 4px}
.course-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:1.5px solid}
.course-info{flex:1}
.course-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px}
.course-desc{font-size:13px;color:var(--text-dim)}
.course-meta{font-size:12px;color:var(--text-dim);margin-top:2px}
.level-row{display:flex;gap:16px;position:relative}
.level-row::before{content:"";position:absolute;top:50%;left:30px;right:30px;height:2px;background:var(--border);z-index:0}
.level-card{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;text-decoration:none;color:var(--text);transition:all .3s ease;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer}
.level-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.4)}
.level-card.locked{opacity:0.4;cursor:not-allowed}
.level-card.locked:hover{transform:none;box-shadow:none}
.level-card.bronze{border-color:rgba(212,165,116,0.25)}.level-card.bronze:hover{border-color:var(--bronze);box-shadow:0 12px 32px rgba(212,165,116,0.15)}
.level-card.silver{border-color:rgba(192,200,216,0.25)}.level-card.silver:hover{border-color:var(--silver);box-shadow:0 12px 32px rgba(192,200,216,0.15)}
.level-card.gold{border-color:rgba(240,192,64,0.3);background:linear-gradient(135deg,rgba(240,192,64,0.04),rgba(26,26,46,0.8))}.level-card.gold:hover{border-color:var(--gold);box-shadow:0 12px 32px rgba(240,192,64,0.2)}
.level-medal{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:all .3s}
.level-card:hover .level-medal{transform:scale(1.1)}
.level-medal.bronze-m{background:linear-gradient(135deg,#d4a574,#b8865e);box-shadow:0 4px 16px rgba(212,165,116,0.3);color:#fff}
.level-medal.silver-m{background:linear-gradient(135deg,#c0c8d8,#9aa0b0);box-shadow:0 4px 16px rgba(192,200,216,0.3);color:#1a1a2e}
.level-medal.gold-m{background:linear-gradient(135deg,#f0c040,#c9a020);box-shadow:0 4px 20px rgba(240,192,64,0.4);color:#1a1a2e;animation:medalGlow 2s ease-in-out infinite}
.level-medal.locked-m{background:var(--card2);border:2px dashed var(--border);color:var(--text-dim);box-shadow:none}
@keyframes medalGlow{0%,100%{box-shadow:0 4px 20px rgba(240,192,64,0.3)}50%{box-shadow:0 4px 28px rgba(240,192,64,0.6)}}
.level-tier{font-size:13px;font-weight:700}
.level-points{font-size:12px;color:var(--text-dim)}
.level-status{font-size:11px;padding:2px 10px;border-radius:10px;margin-top:4px}
.level-status.cleared{background:rgba(110,231,183,0.15);color:var(--green)}
.level-status.waiting{background:rgba(148,163,184,0.1);color:var(--text-dim)}
.level-status.new{background:rgba(167,139,250,0.15);color:var(--purple);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
/* Side quest section */
.side-section{margin-top:48px;padding-top:32px;border-top:2px solid var(--border)}
.side-section h2{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:16px;text-align:center}
.side-board{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.side-card{background:linear-gradient(135deg,rgba(233,69,96,0.08),rgba(26,26,46,0.9));border:1.5px solid #e94560;border-radius:16px;padding:20px;width:280px;text-decoration:none;color:var(--text);transition:all .3s;position:relative;overflow:hidden}
.side-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(233,69,96,0.2)}
.side-card.locked-side{opacity:0.5;border-color:var(--border);background:var(--card);cursor:not-allowed}
.side-card.locked-side:hover{transform:none;box-shadow:none}
.side-card.expired-side{opacity:0.3;border-color:var(--border);background:var(--card);filter:grayscale(0.6)}
.side-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.side-card-icon{font-size:24px}
.side-card-title{font-size:16px;font-weight:700}
.side-card-sub{font-size:12px;color:var(--text-dim);margin-bottom:6px}
.side-card-reward{font-size:12px;color:var(--gold)}
.side-card-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 8px;border-radius:8px}
.side-card-badge.urgent{background:#e94560;color:#fff;animation:pulse 1.5s ease-in-out infinite}
.side-card-badge.locked-tag{background:var(--border);color:var(--text-dim)}
.side-card-badge.done{background:rgba(110,231,183,0.2);color:var(--green)}
/* Bottom board */
.board-section{margin-top:24px;text-align:center}
.board-section summary{display:inline-block;color:var(--text-dim);font-size:13px;cursor:pointer;padding:8px 20px;border:1px dashed var(--border);border-radius:10px;transition:all .2s;list-style:none}
.board-section summary:hover{color:var(--text);border-color:var(--text-dim)}
.board-section summary::-webkit-details-marker{display:none}
.board-hidden{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.board-hidden .side-card{width:220px;padding:14px;font-size:13px}
.footer{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px;border-top:1px solid var(--border);margin-top:20px}
</style>
<script src="assets/game.js"></script>
</head>
<body>

<div class="bg-particles" id="bgParts"></div>

<div class="wrapper">

<div class="hero">
  <div class="hero-title">⚗️ 炼金试炼</div>
  <div class="hero-sub">关卡总图 · 自由选择你的试炼之路</div>
  <div class="hero-stats" id="heroStats">
    <div class="hero-stat"><div class="hero-stat-num" id="totalScore">0</div><div class="hero-stat-label">💎 总积分</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="clearedCount">0</div><div class="hero-stat-label">🏆 已通关</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="totalLevels">15</div><div class="hero-stat-label">🗺️ 总关卡</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="badgeCount">0</div><div class="hero-stat-label">🏅 徽章数</div></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot bronze-g"></span>铜牌 10分</div>
  <div class="legend-item"><span class="legend-dot silver-g"></span>银牌 50分</div>
  <div class="legend-item"><span class="legend-dot gold-g"></span>金牌 100分</div>
  <div class="legend-item"><span class="legend-dot locked-g"></span>待解锁</div>
  <div class="legend-item"><span class="legend-dot side-g"></span>分支副本</div>
</div>

<!-- Dynamic content -->
<div id="mainQuests"></div>
<div id="sideSection"></div>

<div class="footer">炼金试炼 · 化学不难学 | 坚持修炼，终成炼金大师 ⚗️</div>

</div>

<script>
(function(){
  /* bg particles */
  var pContainer=document.getElementById('bgParts');
  for(var i=0;i<30;i++){
    var p=document.createElement('div');p.className='p';
    p.style.left=Math.random()*100+'%';
    p.style.animationDelay=Math.random()*6+'s';
    p.style.animationDuration=(4+Math.random()*8)+'s';
    pContainer.appendChild(p);
  }

  var G = HXBNX_GAME;
  var courseIcons = {1:'🧪',2:'⚡',3:'📜',4:'🔥',5:'💎'};
  var tierNames = {bronze:'铜牌关',silver:'银牌关',gold:'金牌关'};
  var tierMedals = {bronze:'🟤',silver:'⚪',gold:'🟡'};
  var tierMedalClass = {bronze:'bronze-m',silver:'silver-m',gold:'gold-m'};

  // Load quest registry
  fetch('data/quests.json').then(function(r){return r.json()}).then(function(reg){
    var s = JSON.parse(localStorage.getItem('hxbnx_game_v2') || '{}');
    var cleared = s.clearedQuests || [];
    var score = s.score || 0;
    var questBadges = s.questBadges || {};
    var badgeCount = Object.keys(questBadges).length;

    document.getElementById('totalScore').textContent = score;
    document.getElementById('clearedCount').textContent = cleared.length;
    document.getElementById('badgeCount').textContent = badgeCount;

    // Separate main vs side
    var mainQuests = {};
    var sideQuests = [];

    // Main quests from reg.quests
    for (var qid in reg.quests) {
      if (!reg.quests.hasOwnProperty(qid)) continue;
      var q = reg.quests[qid];
      if (q.type === 'main') {
        if (!mainQuests[q.course]) mainQuests[q.course] = {};
        mainQuests[q.course][q.tier] = { questId: qid, def: q };
      }
    }

    // Side quests from reg.sideQuests
    if (reg.sideQuests) {
      for (var sqid in reg.sideQuests) {
        if (!reg.sideQuests.hasOwnProperty(sqid)) continue;
        sideQuests.push({ questId: sqid, def: reg.sideQuests[sqid] });
      }
    }

    // Render main quests
    var mainHtml = '';
    var totalCleared = 0;
    for (var course = 1; course <= 5; course++) {
      var cm = reg.courses[course] || {};
      var icon = courseIcons[course] || '📚';
      var clearedThisCourse = 0;

      mainHtml += '<div class="course-section"><div class="course-header">';
      mainHtml += '<div class="course-icon">' + icon + '</div>';
      mainHtml += '<div class="course-info">';
      mainHtml += '<div class="course-name">第' + course + '课时 · ' + (cm.title || '待定') + '</div>';
      mainHtml += '<div class="course-desc">' + (cm.subtitle || '') + '</div>';
      mainHtml += '</div></div><div class="level-row">';

      var tiers = ['bronze', 'silver', 'gold'];
      for (var ti = 0; ti < tiers.length; ti++) {
        var tier = tiers[ti];
        var qid = 'main-' + course + '-' + tier;
        var isCleared = cleared.indexOf(qid) >= 0;
        var isUnlocked = (ti === 0) || cleared.indexOf('main-' + course + '-' + tiers[ti-1]) >= 0;
        var points = tier === 'bronze' ? 10 : tier === 'silver' ? 50 : 100;

        if (isCleared) {
          clearedThisCourse++;
          totalCleared++;
        }

        var cardClass = tier + (isUnlocked ? '' : ' locked');
        var medalClass = isUnlocked ? tierMedalClass[tier] : 'locked-m';
        var statusClass = isCleared ? 'cleared' : 'waiting';
        var statusText = isCleared ? '✓ 已通关' : (isUnlocked ? '待挑战' : '待解锁');

        mainHtml += '<a href="level.html?q=' + qid + '" class="level-card ' + cardClass + '" data-qid="' + qid + '">';
        mainHtml += '<div class="level-medal ' + medalClass + '">' + tierMedals[tier] + '</div>';
        mainHtml += '<div class="level-tier">' + tierNames[tier] + '</div>';
        mainHtml += '<div class="level-points">通关 +' + points + ' 积分</div>';
        mainHtml += '<div class="level-status ' + statusClass + '">' + statusText + '</div>';
        mainHtml += '</a>';
      }
      mainHtml += '</div></div>';
    }

    document.getElementById('mainQuests').innerHTML = mainHtml;
    document.getElementById('totalLevels').textContent = '15';
    document.getElementById('clearedCount').textContent = totalCleared;

    // Render side quests
    if (sideQuests.length === 0) return;

    var activeQuests = [];
    var boardQuests = [];
    for (var si = 0; si < sideQuests.length; si++) {
      var sq = sideQuests[si];
      var state = calcSideState(sq, cleared, new Date());
      if (state === 'unlocked' || state === 'cleared' || state === 'in_progress') {
        activeQuests.push({ questId: sq.questId, def: sq.def, state: state });
      } else {
        boardQuests.push({ questId: sq.questId, def: sq.def, state: state });
      }
    }

    var sideHtml = '';

    // Active side quests
    if (activeQuests.length > 0) {
      sideHtml += '<div class="side-section"><h2>📜 分支副本</h2><div class="side-board">';
      for (var ai = 0; ai < activeQuests.length; ai++) {
        var aq = activeQuests[ai];
        sideHtml += renderSideCard(aq.questId, aq.def, aq.state);
      }
      sideHtml += '</div></div>';
    }

    // Board quests (locked/expired/hidden)
    if (boardQuests.length > 0) {
      sideHtml += '<div class="board-section"><details><summary>📋 悬赏任务板 (' + boardQuests.length + ')</summary><div class="board-hidden">';
      for (var bi = 0; bi < boardQuests.length; bi++) {
        var bq = boardQuests[bi];
        sideHtml += renderSideCard(bq.questId, bq.def, bq.state);
      }
      sideHtml += '</div></details></div>';
    }

    document.getElementById('sideSection').innerHTML = sideHtml;
  }).catch(function(err){
    document.getElementById('mainQuests').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">加载关卡数据失败: ' + err.message + '</div>';
  });

  function calcSideState(sq, cleared, now) {
    var qid = sq.questId, def = sq.def;
    if (def.validUntil && new Date(def.validUntil) < now) return 'expired';
    if (cleared.indexOf(qid) >= 0) return 'cleared';
    if (def.unlock) {
      var u = def.unlock;
      if (u.minCourse !== undefined && u.minTier !== undefined) {
        var prereq = 'main-' + u.minCourse + '-' + u.minTier;
        if (cleared.indexOf(prereq) < 0) return 'locked';
      }
      if (u.triggerAchievement) return 'locked'; // Simplified
    }
    return 'unlocked';
  }

  function renderSideCard(qid, def, state) {
    var isLocked = (state === 'locked' || state === 'expired');
    var cls = 'side-card';
    var badgeCls = '';
    var badgeText = '';
    if (state === 'unlocked') { cls += ''; badgeCls = 'urgent'; badgeText = 'NEW'; }
    else if (state === 'cleared') { cls += ''; badgeCls = 'done'; badgeText = '✓'; }
    else if (state === 'expired') { cls += ' expired-side'; badgeCls = 'locked-tag'; badgeText = '已过期'; }
    else { cls += ' locked-side'; badgeCls = 'locked-tag'; badgeText = '未解锁'; }

    var icon = (def.theme && def.theme.icon) || '📜';
    var href = isLocked ? 'javascript:void(0)' : 'level.html?q=' + qid;
    var title = state === 'expired' ? (def.title + ' (已过期)') : def.title;

    var h = '<a href="' + href + '" class="' + cls + '" data-qid="' + qid + '">';
    if (badgeText) h += '<div class="side-card-badge ' + badgeCls + '">' + badgeText + '</div>';
    h += '<div class="side-card-header"><span class="side-card-icon">' + icon + '</span>';
    h += '<span class="side-card-title">' + title + '</span></div>';
    h += '<div class="side-card-sub">' + (def.subtitle || '') + '</div>';
    h += '<div class="side-card-reward">⭐ ' + (def.baseScore || 0) + ' 积分' + (def.xpMultiplier ? ' (+' + Math.round((def.xpMultiplier-1)*100) + '% XP)' : '') + '</div>';

    if (def.validUntil && state !== 'expired') {
      var days = Math.ceil((new Date(def.validUntil) - new Date()) / 86400000);
      if (days > 0) h += '<div style="font-size:11px;color:#e94560;margin-top:4px">⏳ 剩余 ' + days + ' 天</div>';
    }
    if (def.unlock && state === 'locked') {
      h += '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">🔒 </div>';
    }
    h += '</a>';
    return h;
  }
})();
</script>

</body>
</html>
