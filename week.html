<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>高考日记 | 化学不难学</title>
<link rel="stylesheet" href="assets/diary.css">
</head>
<body>

<!-- 顶部导航 -->
<div style="padding:16px 20px;display:flex;align-items:center;gap:12px;">
  <a href="index.html" style="color:var(--gold);text-decoration:none;font-size:14px;">← 返回首页</a>
  <span style="color:var(--border);">|</span>
  <span id="navTitle" style="color:var(--muted);font-size:14px;"></span>
</div>

<!-- 周次内容 -->
<div style="max-width:800px;margin:0 auto;padding:0 20px 40px;">
  <div style="margin-bottom:20px;">
    <div style="font-size:28px;font-weight:800;color:var(--gold);margin-bottom:4px;" id="weekTitle"></div>
    <div style="font-size:13px;color:var(--muted);" id="weekDate"></div>
  </div>

  <div class="week-content" style="display:block;">
    <div style="margin-bottom:24px;">
      <div class="section-title">本周复习内容</div>
      <ul class="topic-list" id="weekTopics"></ul>
    </div>

    <div style="margin-bottom:24px;">
      <div class="section-title">本周任务</div>
      <ul class="task-list" id="weekTasks"></ul>
    </div>

    <div>
      <div class="section-title">学习心得</div>
      <div class="notes-box">（点击此处记录本周学习心得...）</div>
    </div>
  </div>

  <!-- 周次导航 -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:30px;padding-top:20px;border-top:1px solid var(--border);">
    <a id="prevWeekLink" href="#" style="color:var(--muted);text-decoration:none;font-size:14px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;transition:all 0.2s;">← 上一周</a>
    <a href="index.html" style="color:var(--gold);text-decoration:none;font-size:14px;">返回目录</a>
    <a id="nextWeekLink" href="#" style="color:var(--muted);text-decoration:none;font-size:14px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;transition:all 0.2s;">下一周 →</a>
  </div>
</div>

<script>
(function() {
  var TOTAL_WEEKS = 40;

  // 解析 URL 参数
  function getParam(name) {
    var match = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
    return match ? parseInt(match[1]) : 1;
  }

  var weekNum = getParam('w');
  if (weekNum < 1) weekNum = 1;
  if (weekNum > TOTAL_WEEKS) weekNum = TOTAL_WEEKS;

  // 生成周次数据
  function getWeekDateRange(wn) {
    var start = new Date(2026, 6, 6);
    start.setDate(start.getDate() + (wn - 1) * 7);
    var end = new Date(start);
    end.setDate(end.getDate() + 6);
    return formatDate(start) + ' ~ ' + formatDate(end);
  }

  function formatDate(d) {
    return (d.getMonth() + 1) + '月' + d.getDate() + '日';
  }

  // 填充内容
  document.getElementById('navTitle').textContent = '第' + weekNum + '周';
  document.getElementById('weekTitle').textContent = '第' + weekNum + '周';
  document.getElementById('weekDate').textContent = getWeekDateRange(weekNum);

  // 占位知识点
  var topicsHtml = '';
  for (var i = 1; i <= 3; i++) {
    topicsHtml += '<li class="placeholder">（待填入本周复习知识点' + i + '）</li>';
  }
  document.getElementById('weekTopics').innerHTML = topicsHtml;

  // 占位任务
  var tasks = ['完成本周知识点复习', '做配套练习题', '整理错题'];
  var tasksHtml = '';
  for (var j = 0; j < tasks.length; j++) {
    tasksHtml += '<li><input type="checkbox" disabled><span>' + tasks[j] + '</span></li>';
  }
  document.getElementById('weekTasks').innerHTML = tasksHtml;

  // 导航链接
  var prevLink = document.getElementById('prevWeekLink');
  var nextLink = document.getElementById('nextWeekLink');

  if (weekNum > 1) {
    prevLink.href = 'week.html?w=' + (weekNum - 1);
    prevLink.style.color = 'var(--text)';
  } else {
    prevLink.style.opacity = '0.3';
    prevLink.style.pointerEvents = 'none';
  }

  if (weekNum < TOTAL_WEEKS) {
    nextLink.href = 'week.html?w=' + (weekNum + 1);
    nextLink.style.color = 'var(--text)';
  } else {
    nextLink.style.opacity = '0.3';
    nextLink.style.pointerEvents = 'none';
  }

})();
</script>
</body>
</html>
