<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>元素徽章对战 | 化学不难学</title>
<style>
/* ===== 全局变量 ===== */
:root {
  --bg: #0a0e1a;
  --card: #11182b;
  --gold: #f0c040;
  --cyan: #67e8f9;
  --red: #f87171;
  --green: #6ee7b7;
  --purple: #a78bfa;
  --orange: #fb923c;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: rgba(103,232,249,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  animation: pageFadeIn 0.6s ease-out;
}

/* ===== 页面加载淡入动画 ===== */
@keyframes pageFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== 粒子/星空背景 ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(1px 1px at 12% 25%, rgba(248,113,113,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 32% 55%, rgba(240,192,64,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 12%, rgba(167,139,250,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 82%, rgba(103,232,249,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 38%, rgba(110,231,183,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 18% 88%, rgba(248,113,113,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 42% 48%, rgba(240,192,64,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 18%, rgba(167,139,250,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 62% 72%, rgba(103,232,249,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 38%, rgba(110,231,183,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 58%, rgba(248,113,113,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 8% 52%, rgba(240,192,64,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 38% 92%, rgba(167,139,250,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 68% 28%, rgba(103,232,249,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 72%, rgba(110,231,183,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 48% 8%, rgba(248,113,113,0.25) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 58% 98%, rgba(240,192,64,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 2% 68%, rgba(167,139,250,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 45%, rgba(103,232,249,0.25) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
  animation: starDrift 10s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(1px 1px at 16% 44%, rgba(255,255,255,0.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 36% 16%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 56% 64%, rgba(255,255,255,0.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 76% 34%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 6% 76%, rgba(255,255,255,0.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 86% 86%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 26% 56%, rgba(255,255,255,0.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 66% 6%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 46% 46%, rgba(255,255,255,0.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 96% 26%, rgba(255,255,255,0.12) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
  animation: starDrift 7s ease-in-out infinite alternate-reverse;
}
@keyframes starDrift {
  0% { opacity: 0.5; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* 确保内容在背景之上 */
.top-nav, .page-header, .phase, .page-footer {
  position: relative;
  z-index: 1;
}

/* ===== 顶部导航 ===== */
.top-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(17,24,43,0.6);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-left { display: flex; align-items: center; gap: 16px; }
.back-link {
  color: var(--muted);
  text-decoration: none;
  font-size: 14px;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-link:hover { color: var(--gold); }
.nav-right { display: flex; align-items: center; gap: 12px; }
.score-display {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 14px;
}
.score-icon { font-size: 16px; }
.score-num { font-weight: 700; color: var(--gold); }
.badge-progress {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 14px;
}
.badge-icon { font-size: 16px; }
.badge-num { font-weight: 700; color: var(--cyan); }

/* ===== 页面标题 ===== */
.page-header {
  text-align: center;
  padding: 28px 20px 16px;
}
.page-title {
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--red), var(--orange), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
}

/* ===== 阶段容器 ===== */
.phase {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 16px 30px;
  display: none;
}
.phase.active { display: block; }

/* ===== 阶段1：元素选择 ===== */
.difficulty-group {
  margin-bottom: 24px;
}
.difficulty-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
/* 难度组渐变色标题栏 */
.diff-1 .difficulty-header {
  background: linear-gradient(90deg, rgba(110,231,183,0.1), transparent);
  border-radius: 8px 8px 0 0;
  padding: 10px 12px;
  border-bottom: 2px solid rgba(110,231,183,0.3);
}
.diff-2 .difficulty-header {
  background: linear-gradient(90deg, rgba(103,232,249,0.1), transparent);
  border-radius: 8px 8px 0 0;
  padding: 10px 12px;
  border-bottom: 2px solid rgba(103,232,249,0.3);
}
.diff-3 .difficulty-header {
  background: linear-gradient(90deg, rgba(251,146,60,0.1), transparent);
  border-radius: 8px 8px 0 0;
  padding: 10px 12px;
  border-bottom: 2px solid rgba(251,146,60,0.3);
}
.diff-4 .difficulty-header {
  background: linear-gradient(90deg, rgba(167,139,250,0.1), transparent);
  border-radius: 8px 8px 0 0;
  padding: 10px 12px;
  border-bottom: 2px solid rgba(167,139,250,0.3);
}
.diff-5 .difficulty-header {
  background: linear-gradient(90deg, rgba(248,113,113,0.1), transparent);
  border-radius: 8px 8px 0 0;
  padding: 10px 12px;
  border-bottom: 2px solid rgba(248,113,113,0.3);
}
.difficulty-label {
  font-size: 15px;
  font-weight: 700;
}
.difficulty-count {
  font-size: 12px;
  color: var(--muted);
  margin-left: auto;
}
.diff-1 .difficulty-label { color: var(--green); }
.diff-2 .difficulty-label { color: var(--cyan); }
.diff-3 .difficulty-label { color: var(--orange); }
.diff-4 .difficulty-label { color: var(--purple); }
.diff-5 .difficulty-label { color: var(--red); }

/* 元素网格 */
.elements-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
}
.element-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 12px 10px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}
/* 元素卡片hover浮起效果 */
.element-card:hover:not(.locked):not(.won) {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: 0 6px 24px rgba(240,192,64,0.15);
}
/* 元素卡片分类颜色左边框 */
.element-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  border-radius: 14px 0 0 14px;
  background: var(--border);
}
.element-card.locked {
  opacity: 0.35;
  cursor: not-allowed;
  filter: grayscale(0.6);
}
.element-card.won {
  border-color: var(--green);
  background: rgba(110,231,183,0.06);
  cursor: default;
}
/* 已获得徽章闪光动画 */
.element-card.won::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(110,231,183,0.15) 50%, transparent 60%);
  animation: badgeShine 3s ease-in-out infinite;
}
@keyframes badgeShine {
  0%, 100% { transform: translateX(-100%) rotate(0deg); }
  50% { transform: translateX(100%) rotate(0deg); }
}
.element-card .elem-z {
  font-size: 10px;
  color: var(--muted);
  position: absolute;
  top: 6px;
  left: 8px;
}
.element-card .elem-sym {
  font-size: 28px;
  font-weight: 800;
  margin: 4px 0;
  line-height: 1.2;
}
.element-card .elem-name {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.element-card .elem-stars {
  font-size: 11px;
  color: var(--gold);
}
.element-card .elem-won-mark {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 14px;
  color: var(--green);
  font-weight: 700;
}
.element-card .elem-won-date {
  font-size: 10px;
  color: var(--green);
  margin-top: 2px;
}

/* ===== 阶段2：宠物选择 ===== */
.pet-select-title {
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
  color: var(--gold);
}
.pet-select-sub {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 20px;
}
.pet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.pet-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}
/* 宠物卡片hover浮起效果 */
.pet-card:hover:not(.disabled) {
  border-color: var(--cyan);
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(103,232,249,0.12);
}
.pet-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 24px rgba(240,192,64,0.25);
  background: rgba(240,192,64,0.05);
}
/* 传说/神话宠物彩虹边框动画 */
.pet-card.rarity-legendary {
  border-image: linear-gradient(135deg, #f0c040, #fb923c, #a78bfa, #67e8f9, #6ee7b7, #f0c040) 1;
  animation: rainbowBorderGlow 3s linear infinite;
}
@keyframes rainbowBorderGlow {
  0% { box-shadow: 0 0 12px rgba(240,192,64,0.3), 0 0 24px rgba(240,192,64,0.1); }
  25% { box-shadow: 0 0 12px rgba(167,139,250,0.3), 0 0 24px rgba(167,139,250,0.1); }
  50% { box-shadow: 0 0 12px rgba(103,232,249,0.3), 0 0 24px rgba(103,232,249,0.1); }
  75% { box-shadow: 0 0 12px rgba(110,231,183,0.3), 0 0 24px rgba(110,231,183,0.1); }
  100% { box-shadow: 0 0 12px rgba(240,192,64,0.3), 0 0 24px rgba(240,192,64,0.1); }
}
.pet-card.rarity-mythic {
  border-image: linear-gradient(135deg, #f87171, #fb923c, #f0c040, #6ee7b7, #67e8f9, #a78bfa, #f87171) 1;
  animation: mythicBorderGlow 2s linear infinite;
}
@keyframes mythicBorderGlow {
  0% { box-shadow: 0 0 16px rgba(248,113,113,0.4), 0 0 32px rgba(248,113,113,0.15); }
  20% { box-shadow: 0 0 16px rgba(251,146,60,0.4), 0 0 32px rgba(251,146,60,0.15); }
  40% { box-shadow: 0 0 16px rgba(240,192,64,0.4), 0 0 32px rgba(240,192,64,0.15); }
  60% { box-shadow: 0 0 16px rgba(103,232,249,0.4), 0 0 32px rgba(103,232,249,0.15); }
  80% { box-shadow: 0 0 16px rgba(167,139,250,0.4), 0 0 32px rgba(167,139,250,0.15); }
  100% { box-shadow: 0 0 16px rgba(248,113,113,0.4), 0 0 32px rgba(248,113,113,0.15); }
}
.pet-card .pet-icon { font-size: 40px; margin-bottom: 6px; }
.pet-card .pet-name { font-size: 14px; font-weight: 700; }
.pet-card .pet-formula { font-size: 12px; color: var(--cyan); margin-top: 2px; }
.pet-card .pet-level {
  font-size: 11px;
  color: var(--gold);
  margin-top: 4px;
  background: rgba(240,192,64,0.1);
  display: inline-block;
  padding: 1px 8px;
  border-radius: 8px;
}
/* 战力数字大号加粗显示 */
.pet-card .pet-power {
  font-size: 16px;
  color: var(--orange);
  margin-top: 4px;
  font-weight: 800;
}
.pet-card .pet-stats-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
}
.pet-card .pet-stats-row span { display: flex; align-items: center; gap: 2px; }
.pet-card .pet-stats-row .stat-hp { color: var(--green); }
.pet-card .pet-stats-row .stat-atk { color: var(--red); }
.pet-card .pet-stats-row .stat-def { color: var(--cyan); }
.pet-card .pet-rarity {
  font-size: 10px;
  margin-top: 4px;
  font-weight: 700;
}
.no-pets-hint {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
}
.no-pets-hint a {
  color: var(--gold);
  text-decoration: underline;
}

/* 操作按钮区 */
.action-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 24px;
}
.btn {
  padding: 12px 28px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.15s, box-shadow 0.2s;
}
/* 按钮按下缩放效果 */
.btn:active:not(:disabled) {
  transform: scale(0.95);
}
.btn:hover:not(:disabled) { transform: scale(1.03); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--orange));
  color: #000;
}
.btn-secondary {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
}

/* ===== 阶段3：对战界面 ===== */
.battle-container {
  max-width: 700px;
  margin: 0 auto;
}
.battle-info-bar {
  text-align: center;
  padding: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 16px;
  font-size: 14px;
  color: var(--muted);
}
.battle-info-bar .elem-badge {
  font-size: 22px;
  font-weight: 800;
  color: var(--gold);
  margin: 0 6px;
}
.battle-info-bar .turn-info {
  color: var(--cyan);
  font-weight: 700;
}
.fighter-area {
  background: linear-gradient(180deg, rgba(17,24,43,0.9), rgba(10,14,26,0.95));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
}
/* 攻击时屏幕轻微震动 */
.fighter-area.screen-shake {
  animation: screenShake 0.3s ease;
}
@keyframes screenShake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-3px, -1px); }
  20% { transform: translate(3px, 1px); }
  30% { transform: translate(-2px, 2px); }
  40% { transform: translate(2px, -2px); }
  50% { transform: translate(-1px, 1px); }
  60% { transform: translate(1px, -1px); }
  70% { transform: translate(-1px, 0px); }
  80% { transform: translate(1px, 1px); }
  90% { transform: translate(0px, -1px); }
}
.fighter {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  border-radius: 16px;
  transition: background 0.3s;
}
.fighter-icon {
  font-size: 52px;
  flex-shrink: 0;
  transition: transform 0.3s;
}
.fighter-info { flex: 1; min-width: 0; }
.fighter-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}
.fighter-level {
  font-size: 11px;
  color: var(--gold);
}
.fighter-skill {
  font-size: 11px;
  color: var(--purple);
  margin-top: 2px;
}
.fighter-hp-section { margin-top: 6px; }
.fighter-hp-text {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 3px;
  display: flex;
  justify-content: space-between;
}
.hp-bar-outer {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 5px;
  overflow: hidden;
}
.hp-bar-inner {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s ease, background 0.4s;
  background: linear-gradient(90deg, var(--green), #4ade80);
}
.hp-bar-inner.hp-mid {
  background: linear-gradient(90deg, var(--orange), #fbbf24);
}
.hp-bar-inner.hp-low {
  background: linear-gradient(90deg, var(--red), #ef4444);
}
.vs-divider {
  text-align: center;
  padding: 8px 0;
  position: relative;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin: 12px 0;
}
.vs-divider::before,
.vs-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 30px);
  height: 1px;
  background: var(--border);
}
.vs-divider::before { left: 0; }
.vs-divider::after { right: 0; }
/* VS文字火焰动画效果 */
.vs-text {
  font-size: 22px;
  font-weight: 900;
  color: var(--red);
  text-shadow: 0 0 16px rgba(248,113,113,0.4);
  position: relative;
  z-index: 1;
  animation: vsFlame 1.5s ease-in-out infinite;
}
@keyframes vsFlame {
  0%, 100% {
    text-shadow: 0 0 10px rgba(248,113,113,0.4), 0 0 20px rgba(251,146,60,0.2), 0 -2px 4px rgba(240,192,64,0.3);
    transform: scale(1);
  }
  25% {
    text-shadow: 0 0 16px rgba(248,113,113,0.6), 0 0 30px rgba(251,146,60,0.3), 0 -4px 8px rgba(240,192,64,0.4);
    transform: scale(1.05);
  }
  50% {
    text-shadow: 0 0 12px rgba(248,113,113,0.5), 0 0 24px rgba(251,146,60,0.25), 0 -3px 6px rgba(240,192,64,0.35);
    transform: scale(1.02);
  }
  75% {
    text-shadow: 0 0 18px rgba(248,113,113,0.55), 0 0 32px rgba(251,146,60,0.35), 0 -5px 10px rgba(240,192,64,0.45);
    transform: scale(1.06);
  }
}
.battle-log-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  max-height: 220px;
  overflow-y: auto;
  margin-bottom: 16px;
}
.battle-log-box::-webkit-scrollbar { width: 4px; }
.battle-log-box::-webkit-scrollbar-track { background: transparent; }
.battle-log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.log-line {
  font-size: 13px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  line-height: 1.5;
  animation: logFadeIn 0.3s ease;
}
.log-line:last-child { border-bottom: none; }
@keyframes logFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.log-player { color: var(--cyan); }
.log-enemy { color: var(--red); }
.log-system { color: var(--gold); font-weight: 700; }
.battle-actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}
.battle-btn {
  padding: 14px 24px;
  border-radius: 14px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
  min-width: 110px;
  text-align: center;
}
/* 战斗按钮按下缩放效果 */
.battle-btn:active:not(:disabled) {
  transform: scale(0.95);
}
.battle-btn:hover:not(:disabled) {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(240,192,64,0.15);
}
.battle-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}
.battle-btn.btn-attack { border-color: rgba(248,113,113,0.4); }
.battle-btn.btn-attack:hover:not(:disabled) { border-color: var(--red); box-shadow: 0 6px 20px rgba(248,113,113,0.2); }
.battle-btn.btn-skill { border-color: rgba(167,139,250,0.4); }
.battle-btn.btn-skill:hover:not(:disabled) { border-color: var(--purple); box-shadow: 0 6px 20px rgba(167,139,250,0.2); }
/* 技能释放闪光效果 */
.battle-btn.btn-skill.skill-flash {
  animation: skillFlash 0.4s ease;
}
@keyframes skillFlash {
  0% { box-shadow: 0 0 0 rgba(167,139,250,0); }
  50% { box-shadow: 0 0 30px rgba(167,139,250,0.5), 0 0 60px rgba(167,139,250,0.2); }
  100% { box-shadow: 0 0 0 rgba(167,139,250,0); }
}
.battle-btn.btn-defend { border-color: rgba(103,232,249,0.4); }
.battle-btn.btn-defend:hover:not(:disabled) { border-color: var(--cyan); box-shadow: 0 6px 20px rgba(103,232,249,0.2); }

/* ===== 阶段4：结算界面 ===== */
.result-container {
  max-width: 440px;
  margin: 0 auto;
  text-align: center;
}
.result-panel {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 24px;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}
.result-panel.win-panel { border-color: rgba(240,192,64,0.4); }
.result-panel.lose-panel { border-color: rgba(248,113,113,0.3); }
.result-icon { font-size: 64px; margin-bottom: 12px; }
.result-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
}
.result-title.win { color: var(--gold); }
.result-title.lose { color: var(--red); }
.result-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 24px;
}
.badge-reveal {
  background: rgba(240,192,64,0.06);
  border: 2px solid rgba(240,192,64,0.3);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
  animation: badgeGlow 2s ease-in-out infinite;
}
@keyframes badgeGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(240,192,64,0.1); }
  50% { box-shadow: 0 0 40px rgba(240,192,64,0.25); }
}
/* 徽章翻转揭示动画 */
.badge-reveal.flip-reveal {
  animation: badgeFlip 0.8s ease-out, badgeGlow 2s ease-in-out infinite 0.8s;
}
@keyframes badgeFlip {
  0% { transform: rotateY(0deg) scale(0.8); opacity: 0; }
  50% { transform: rotateY(180deg) scale(1.1); opacity: 0.5; }
  100% { transform: rotateY(360deg) scale(1); opacity: 1; }
}
.badge-reveal .badge-big-icon { font-size: 56px; margin-bottom: 8px; }
.badge-reveal .badge-elem-sym {
  font-size: 36px;
  font-weight: 900;
  color: var(--gold);
}
.badge-reveal .badge-elem-name {
  font-size: 16px;
  color: var(--text);
  margin-top: 2px;
}
.badge-reveal .badge-elem-num {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.badge-reveal .badge-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  font-style: italic;
}
.rewards-list {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 24px;
}
.reward-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  text-align: center;
}
.reward-item .reward-label {
  font-size: 11px;
  color: var(--muted);
}
.reward-item .reward-value {
  font-size: 18px;
  font-weight: 700;
  margin-top: 2px;
}
.reward-item .reward-value.score-val { color: var(--gold); }
.reward-item .reward-value.exp-val { color: var(--cyan); }
/* 积分数字滚动效果 */
.reward-value.score-anim {
  animation: scoreCountUp 0.8s ease-out;
}
@keyframes scoreCountUp {
  0% { transform: translateY(10px); opacity: 0; }
  30% { transform: translateY(-3px); opacity: 1; }
  60% { transform: translateY(1px); }
  100% { transform: translateY(0); }
}

/* ===== 胜利烟花/粒子效果（CSS动画） ===== */
.victory-fireworks {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.firework-particle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  opacity: 0;
  animation: fireworkBurst 1.2s ease-out forwards;
}
@keyframes fireworkBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--fx), var(--fy)) scale(0); }
}
/* 胜利面板闪光效果 */
.result-panel.win-panel::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(240,192,64,0.05), transparent, rgba(251,146,60,0.05), transparent);
  animation: victoryRotate 6s linear infinite;
}
@keyframes victoryRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ===== 动画 ===== */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px) rotate(-1deg); }
  40% { transform: translateX(6px) rotate(1deg); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
@keyframes hurtFlash {
  0% { background: transparent; }
  30% { background: rgba(248,113,113,0.2); }
  100% { background: transparent; }
}
@keyframes attackAnim {
  0% { transform: translateX(0); }
  30% { transform: translateX(16px) scale(1.05); }
  100% { transform: translateX(0); }
}
@keyframes enemyAttackAnim {
  0% { transform: translateX(0); }
  30% { transform: translateX(-16px) scale(1.05); }
  100% { transform: translateX(0); }
}
.anim-shake { animation: shake 0.4s ease; }
.anim-hurt { animation: hurtFlash 0.5s ease; }
.anim-attack { animation: attackAnim 0.4s ease; }
.anim-enemy-attack { animation: enemyAttackAnim 0.4s ease; }

/* ===== 金色粒子特效 ===== */
.particle-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: particleFly 1.5s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-200px) scale(0); }
}

/* ===== 响应式 ===== */
@media (max-width: 600px) {
  .page-title { font-size: 24px; }
  .top-nav { padding: 10px 12px; flex-wrap: wrap; gap: 8px; }
  .nav-right { gap: 8px; }
  .score-display, .badge-progress { padding: 4px 10px; font-size: 12px; }
  .elements-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .element-card { padding: 10px 6px; }
  .element-card .elem-sym { font-size: 22px; }
  .pet-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .fighter { gap: 10px; padding: 12px; }
  .fighter-icon { font-size: 40px; }
  .battle-btn { padding: 12px 18px; font-size: 14px; min-width: 90px; }
  .rewards-list { flex-direction: column; align-items: center; }
}
@media (max-width: 400px) {
  .elements-grid { grid-template-columns: repeat(3, 1fr); }
  .pet-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<!-- ===== 顶部导航 ===== -->
<div class="top-nav">
  <div class="nav-left">
    <a href="index.html" class="back-link">&larr; 返回主页</a>
  </div>
  <div class="nav-right">
    <div class="score-display">
      <span class="score-icon">&#x1F4B0;</span>
      <span class="score-num" id="navScore">0</span>
    </div>
    <div class="badge-progress">
      <span class="badge-icon">&#x1F3C5;</span>
      <span class="badge-num" id="navBadge">0/118</span>
    </div>
  </div>
</div>

<!-- ===== 页面标题 ===== -->
<div class="page-header">
  <div class="page-title">&#x2694;&#xFE0F; 元素徽章对战</div>
  <div class="page-sub">用炼丹获得的宠物挑战元素守护者，集齐118枚元素徽章</div>
</div>

<!-- ===== 阶段1：选择挑战元素 ===== -->
<div class="phase active" id="phase1">
  <div id="elementsContainer"></div>
</div>

<!-- ===== 阶段2：选择出战宠物 ===== -->
<div class="phase" id="phase2">
  <div class="pet-select-title">选择出战宠物</div>
  <div class="pet-select-sub" id="petSelectSub">选择一只宠物挑战 <span id="targetElemName" style="color:var(--gold)"></span> 的守护者</div>
  <div class="pet-grid" id="petGrid"></div>
  <div class="action-bar">
    <button class="btn btn-secondary" onclick="goBackToPhase1()">返回选择</button>
    <button class="btn btn-primary" id="confirmPetBtn" disabled onclick="confirmPet()">确认出战</button>
  </div>
</div>

<!-- ===== 阶段3：对战界面 ===== -->
<div class="phase" id="phase3">
  <div class="battle-container">
    <div class="battle-info-bar">
      <span>挑战元素</span>
      <span class="elem-badge" id="battleElemBadge">H</span>
      <span id="battleElemName">氢</span>
      <span style="margin-left:12px" class="turn-info">第 <span id="battleTurn">1</span> 回合</span>

    <div class="fighter-area" id="fighterArea">
      <div class="fighter" id="enemyFighter">
        <div class="fighter-icon" id="enemyIcon">&#x1F9CA;</div>
        <div class="fighter-info">
          <div class="fighter-name" id="enemyName">守护者</div>
          <div class="fighter-level" id="enemyLevel">Lv.1</div>
          <div class="fighter-skill" id="enemySkill"></div>
          <div class="fighter-hp-section">
            <div class="fighter-hp-text">
              <span>HP</span>
              <span id="enemyHpText">100/100</span>
            </div>
            <div class="hp-bar-outer">
              <div class="hp-bar-inner" id="enemyHpBar" style="width:100%"></div>
            </div>
          </div>

      <div class="vs-divider">
        <span class="vs-text">VS</span>
      </div>

          <div class="fighter-hp-section">
            <div class="fighter-hp-text">
              <span>HP</span>
              <span id="playerHpText">100/100</span>
            </div>
            <div class="hp-bar-outer">
              <div class="hp-bar-inner" id="playerHpBar" style="width:100%"></div>
            </div>

    <div class="battle-log-box" id="battleLog"></div>

      <button class="battle-btn btn-attack" id="btnAttack" onclick="playerAction('attack')">&#x2694;&#xFE0F; 攻击</button>

        <div class="badge-elem-num" id="badgeElemNum"></div>
        <div class="badge-desc" id="badgeDesc"></div>
      </div>
      <div class="rewards-list" id="rewardsList"></div>
      <div class="action-bar">
        <button class="btn btn-secondary" onclick="goBackToPhase1()">返回选择</button>

<!-- ===== 脚本引用 ===== -->
<script src="assets/game.js?v=2"></script>
<script src="assets/alchemy.js"></script>
<script src="assets/elements-data.js"></script>
<script src="assets/battle-system.js"></script>

<script>
(function() {
  'use strict';

  // ===== 常量定义 =====
  var RARITY_NAMES = ['', '普通', '稀有', '史诗', '传说', '神话'];
  var RARITY_COLORS = ['', '#94a3b8', '#6ee7b7', '#67e8f9', '#a78bfa', '#f0c040'];
  var DIFF_NAMES = { 1: '基础元素', 2: '进阶元素', 3: '高级元素', 4: '稀有元素', 5: '传说元素' };
  var DIFF_ICONS = { 1: '\u{1F331}', 2: '\u{1F525}', 3: '\u{26A1}', 4: '\u{1F451}', 5: '\u{2622}\uFE0F' };

  // ===== 页面状态 =====
  var selectedElementId = null;
  var selectedPetId = null;
  var currentBattleId = null;
  var isBattleAnimating = false;

  // ===== 页面初始化 =====
  function init() {
    updateNavInfo();
    renderElements();
  }

  // ===== 更新顶部导航栏信息 =====
  function updateNavInfo() {
    var score = 0;
    try {
      var s = JSON.parse(localStorage.getItem('hxbnx_game_v2') || '{}');
      score = s.score || 0;
    } catch(e) {}
    document.getElementById('navScore').textContent = score;
    var stats = BATTLE_SYSTEM.getBadgeStats();
    document.getElementById('navBadge').textContent = stats.total + '/118';
  }

  // ===== 阶段切换控制 =====
  function showPhase(id) {
    var phases = ['phase1', 'phase2', 'phase3', 'phase4'];
    for (var i = 0; i < phases.length; i++) {
      var el = document.getElementById(phases[i]);
      if (el) el.classList.remove('active');
    }
    var target = document.getElementById(id);
    if (target) {
      target.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // ===== 阶段1：渲染元素选择列表 =====
  function renderElements() {
    var container = document.getElementById('elementsContainer');
    var elements = BATTLE_SYSTEM.getAvailableElements();
    var stats = BATTLE_SYSTEM.getBadgeStats();
    var diffRanges = BATTLE_SYSTEM.getDifficultyRanges();

    // 按难度分组
    var groups = {};
    for (var i = 0; i < elements.length; i++) {
      var elem = elements[i];
      var diff = elem.difficulty;
      if (!groups[diff]) groups[diff] = [];
      groups[diff].push(elem);
    }

    var html = '';
    for (var d = 1; d <= 5; d++) {
      var range = diffRanges[d - 1];
      var isUnlocked = BATTLE_SYSTEM.isDifficultyUnlocked(d);
      var elems = groups[d] || [];
      var wonCount = stats.byDifficulty[d] || 0;
      var totalCount = range.maxZ - range.minZ + 1;

      html += '<div class="difficulty-group diff-' + d + '">';
      html += '<div class="difficulty-header">';
      html += '<span class="difficulty-label">' + DIFF_ICONS[d] + ' ' + DIFF_NAMES[d] + '（难度' + d + '）</span>';
      html += '<span class="difficulty-count">已收集 ' + wonCount + '/' + totalCount;
      if (!isUnlocked) {
        html += ' <span style="color:var(--red)">&#x1F512; 未解锁</span>';
      }
      html += '</span></div>';

      if (!isUnlocked) {
        var reqText = '';
        if (d === 2) reqText = '需要收集10个难度1徽章';
        else if (d === 3) reqText = '需要收集20个总徽章';
        else if (d === 4) reqText = '需要收集40个总徽章';
        else if (d === 5) reqText = '需要收集60个总徽章';
        html += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;background:var(--card);border-radius:12px;border:1px solid var(--border)">';
        html += '&#x1F512; ' + reqText + '（当前 ' + stats.total + ' 个）</div>';
      } else if (elems.length === 0) {
        html += '<div style="text-align:center;padding:16px;color:var(--green);font-size:13px;background:var(--card);border-radius:12px;border:1px solid var(--border)">';
        html += '&#x2705; 该难度所有元素徽章已收集完毕！</div>';
      } else {
        html += '<div class="elements-grid">';
        for (var j = 0; j < elems.length; j++) {
          var e = elems[j];
          var starsHtml = '';
          for (var s = 0; s < (e.stars || 1); s++) starsHtml += '\u{2B50}';

          if (e.alreadyWon) {
            html += '<div class="element-card won">';
            html += '<span class="elem-z">#' + e.num + '</span>';
            html += '<span class="elem-won-mark">\u2713</span>';
            html += '<div class="elem-sym">' + e.sym + '</div>';
            html += '<div class="elem-name">' + e.name + '</div>';
            html += '<div class="elem-stars">' + starsHtml + '</div>';
            html += '<div class="elem-won-date">' + (e.wonDate || '') + '</div>';
            html += '</div>';
          } else {
            html += '<div class="element-card" onclick="selectElement(\'' + e.sym + '\')">';
            html += '<span class="elem-z">#' + e.num + '</span>';
            html += '<div class="elem-sym">' + e.sym + '</div>';
            html += '<div class="elem-name">' + e.name + '</div>';
            html += '<div class="elem-stars">' + starsHtml + '</div>';
            html += '</div>';
          }
        }
        html += '</div>';
      }
      html += '</div>';
    }
    container.innerHTML = html;
  }

  // ===== 点击元素卡片（进入阶段2）=====
  window.selectElement = function(sym) {
    selectedElementId = sym;
    selectedPetId = null;
    var elemName = sym;
    var allElems = BATTLE_SYSTEM.getAvailableElements();
    for (var i = 0; i < allElems.length; i++) {
      if (allElems[i].sym === sym) {
        elemName = allElems[i].name;
        break;
      }
    }
    document.getElementById('targetElemName').textContent = elemName;
    renderPetSelect();
    showPhase('phase2');
  };

  // ===== 阶段2：渲染宠物选择列表 =====
  function renderPetSelect() {
    var grid = document.getElementById('petGrid');
    var pets = BATTLE_SYSTEM.getMyBattlePets();
    if (pets.length === 0) {
      grid.innerHTML = '<div class="no-pets-hint">还没有宠物，快去<a href="alchemy.html">炼丹炉</a>获取宠物吧！</div>';
      document.getElementById('confirmPetBtn').disabled = true;
      return;
    }
    var html = '';
    for (var i = 0; i < pets.length; i++) {
      var pet = pets[i];
      var isSelected = (selectedPetId === pet.id);
      /* 根据稀有度添加特殊class */
      var rarityClass = '';
      if (pet.rarity === 4) rarityClass = ' rarity-legendary';
      else if (pet.rarity === 5) rarityClass = ' rarity-mythic';
      html += '<div class="pet-card' + (isSelected ? ' selected' : '') + rarityClass + '" onclick="selectPet(\'' + pet.id + '\')">';
      html += '<div class="pet-icon">' + (pet.icon || '\u{1F9EA}') + '</div>';
      html += '<div class="pet-name">' + pet.name + '</div>';
      html += '<div class="pet-formula">' + pet.formula + '</div>';
      html += '<div class="pet-level">Lv.' + pet.level + '</div>';
      html += '<div class="pet-power">&#x2694;&#xFE0F; ' + pet.power + '</div>';
      html += '<div class="pet-stats-row">';
      html += '<span class="stat-hp">HP ' + pet.hp + '</span>';
      html += '<span class="stat-atk">ATK ' + pet.atk + '</span>';
      html += '<span class="stat-def">DEF ' + pet.def + '</span>';
      html += '</div>';
      html += '<div class="pet-rarity" style="color:' + (RARITY_COLORS[pet.rarity] || '#94a3b8') + '">' + (RARITY_NAMES[pet.rarity] || '') + '</div>';
      html += '</div>';
    }
    grid.innerHTML = html;
    document.getElementById('confirmPetBtn').disabled = !selectedPetId;
  }

  // ===== 选择/取消选择宠物 =====
  window.selectPet = function(petId) {
    selectedPetId = (selectedPetId === petId) ? null : petId;
    renderPetSelect();
  };

  // ===== 确认出战（进入阶段3）=====
  window.confirmPet = function() {
    if (!selectedElementId || !selectedPetId) return;
    var result = BATTLE_SYSTEM.startBattle(selectedElementId, selectedPetId);
    if (!result.ok) {
      alert(result.msg);
      return;
    }
    currentBattleId = result.battleId;
    var battle = result.battleState;
    var elem = result.element;
    document.getElementById('battleElemBadge').textContent = elem.sym;
    document.getElementById('battleElemName').textContent = elem.name;
    document.getElementById('battleTurn').textContent = '1';
    renderBattleScene(battle);
    document.getElementById('battleLog').innerHTML = '';
    addLog('&#x1F3AE; 对战开始！挑战 ' + elem.name + '（' + elem.sym + '）的守护者', 'system');
    setBattleButtons(true);
    isBattleAnimating = false;
    showPhase('phase3');
  };

  // ===== 渲染战斗场景 =====
  function renderBattleScene(battle) {
    var player = battle.player;
    var enemy = battle.enemy;
    document.getElementById('playerIcon').textContent = player.icon || '\u{1F9EA}';
    document.getElementById('playerName').textContent = player.name;
    document.getElementById('playerLevel').textContent = 'Lv.' + player.level;
    document.getElementById('playerSkill').textContent = '\u2728 ' + (player.skill || '');
    updateHpBar('player', player.hp, player.maxHp);
    document.getElementById('enemyIcon').textContent = enemy.icon || '\u{1F9CA}';
    document.getElementById('enemyName').textContent = enemy.name;
    document.getElementById('enemyLevel').textContent = 'Lv.' + enemy.level;
    document.getElementById('enemySkill').textContent = '\u2728 ' + (enemy.skill || '');
    updateHpBar('enemy', enemy.hp, enemy.maxHp);
  }

  // ===== 更新HP条 =====
  function updateHpBar(who, hp, maxHp) {
    var pct = Math.max(0, Math.min(100, Math.round(hp / maxHp * 100)));
    var bar = document.getElementById(who + 'HpBar');
    var text = document.getElementById(who + 'HpText');
    bar.style.width = pct + '%';
    text.textContent = hp + '/' + maxHp;
    bar.classList.remove('hp-mid', 'hp-low');
    if (pct <= 20) bar.classList.add('hp-low');
    else if (pct <= 50) bar.classList.add('hp-mid');
  }

  // ===== 玩家操作 =====
  window.playerAction = function(action) {
    if (isBattleAnimating || !currentBattleId) return;
    isBattleAnimating = true;
    setBattleButtons(false);

    /* 技能释放闪光效果 */
    if (action === 'skill') {
      var skillBtn = document.getElementById('btnSkill');
      skillBtn.classList.remove('skill-flash');
      void skillBtn.offsetWidth;
      skillBtn.classList.add('skill-flash');
    }

    var result = BATTLE_SYSTEM.executeTurn(currentBattleId, action);
    if (!result.ok) {
      addLog(result.msg, 'system');
      isBattleAnimating = false;
      setBattleButtons(true);
      return;
    }
    var battle = result.battle;
    for (var i = 0; i < result.logs.length; i++) {
      var log = result.logs[i];
      var msgClass = '';
      var msgHtml = '';
      if (log.actor === 'player') {
        msgClass = 'log-player';
        if (log.action === 'defend') {
          msgHtml = '&#x1F6E1;&#xFE0F; ' + log.msg;
        } else {
          msgHtml = '&#x1F9EA; ' + log.msg;
          triggerAttackAnim('player');
        }
      } else if (log.actor === 'enemy') {
        msgClass = 'log-enemy';
        if (log.action === 'defend') {
          msgHtml = '&#x1F6E1;&#xFE0F; ' + log.msg;
        } else {
          msgHtml = '&#x1F480; ' + log.msg;
          triggerAttackAnim('enemy');
        }
      } else if (log.actor === 'system') {
        msgClass = 'log-system';
        msgHtml = log.msg;
      }
      addLog(msgHtml, msgClass);
    }
    updateHpBar('player', battle.player.hp, battle.player.maxHp);
    updateHpBar('enemy', battle.enemy.hp, battle.enemy.maxHp);
    document.getElementById('battleTurn').textContent = battle.turn;
    if (result.result === 'win' || result.result === 'lose') {
      setTimeout(function() {
        showResult(result.result === 'win', battle);
        isBattleAnimating = false;
      }, 1000);
    } else {
      setTimeout(function() {
        isBattleAnimating = false;
        setBattleButtons(true);
      }, 500);
    }
  };

  // ===== 触发攻击动画 =====
  function triggerAttackAnim(who) {
    var fighterEl = document.getElementById(who === 'player' ? 'playerFighter' : 'enemyFighter');
    var targetEl = document.getElementById(who === 'player' ? 'enemyFighter' : 'playerFighter');
    var fighterArea = document.getElementById('fighterArea');

    fighterEl.classList.remove('anim-attack', 'anim-enemy-attack');
    void fighterEl.offsetWidth;
    fighterEl.classList.add(who === 'player' ? 'anim-attack' : 'anim-enemy-attack');

    /* 攻击时屏幕轻微震动 */
    fighterArea.classList.remove('screen-shake');
    void fighterArea.offsetWidth;
    fighterArea.classList.add('screen-shake');

    setTimeout(function() {
      targetEl.classList.remove('anim-shake', 'anim-hurt');
      void targetEl.offsetWidth;
      targetEl.classList.add('anim-shake');
      setTimeout(function() {
        targetEl.classList.add('anim-hurt');
      }, 200);
    }, 200);
  }

  // ===== 设置战斗按钮状态 =====
  function setBattleButtons(enabled) {
    var btns = ['btnAttack', 'btnSkill', 'btnDefend'];
    for (var i = 0; i < btns.length; i++) {
      document.getElementById(btns[i]).disabled = !enabled;
    }
  }

  // ===== 添加战斗日志 =====
  function addLog(html, cls) {
    var logBox = document.getElementById('battleLog');
    var line = document.createElement('div');
    line.className = 'log-line' + (cls ? ' ' + cls : '');
    line.innerHTML = html;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }

  // ===== 阶段4：显示结算 =====
  function showResult(isWin, battle) {
    var panel = document.getElementById('resultPanel');
    var icon = document.getElementById('resultIcon');
    var title = document.getElementById('resultTitle');
    var subtitle = document.getElementById('resultSubtitle');
    var badgeReveal = document.getElementById('badgeReveal');
    var rewardsList = document.getElementById('rewardsList');
    if (currentBattleId) {
      BATTLE_SYSTEM.cleanupBattle(currentBattleId);
    }
    if (isWin) {
      panel.className = 'result-panel win-panel';
      icon.textContent = '\u{1F3C6}';
      title.textContent = '胜利！';
      title.className = 'result-title win';
      subtitle.textContent = '你击败了 ' + battle.enemy.name + '！';
      var elemId = battle.elementId;
      var elemData = null;
      if (typeof ELEMENTS_DATA !== 'undefined' && ELEMENTS_DATA) {
        for (var i = 0; i < ELEMENTS_DATA.length; i++) {
          if (ELEMENTS_DATA[i].symbol === elemId || ELEMENTS_DATA[i].sym === elemId) {
            elemData = ELEMENTS_DATA[i];
            break;
          }
        }
      }
      if (elemData) {
        badgeReveal.style.display = 'block';
        /* 添加翻转揭示动画 */
        badgeReveal.classList.remove('flip-reveal');
        void badgeReveal.offsetWidth;
        badgeReveal.classList.add('flip-reveal');
        document.getElementById('badgeBigIcon').textContent = elemData.badge || '\u{1F3C5}';
        document.getElementById('badgeElemSym').textContent = elemData.symbol || elemData.sym || elemId;
        document.getElementById('badgeElemName').textContent = elemData.name + '（' + (elemData.nameEn || '') + '）';
        document.getElementById('badgeElemNum').textContent = '原子序数 #' + elemData.z;
        document.getElementById('badgeDesc').textContent = elemData.desc || '';
      } else {
        badgeReveal.style.display = 'block';
        badgeReveal.classList.remove('flip-reveal');
        void badgeReveal.offsetWidth;
        badgeReveal.classList.add('flip-reveal');
        document.getElementById('badgeBigIcon').textContent = '\u{1F3C5}';
        document.getElementById('badgeElemSym').textContent = elemId;
        document.getElementById('badgeElemName').textContent = '元素 ' + elemId;
        document.getElementById('badgeElemNum').textContent = '';
        document.getElementById('badgeDesc').textContent = '';
      }
      var rewards = BATTLE_SYSTEM.getBattleRewards();
      var diffRewards = rewards[battle.difficulty] || rewards[1];
      var scoreGain = diffRewards.winScore;
      rewardsList.innerHTML =
        '<div class="reward-item"><div class="reward-label">积分奖励</div><div class="reward-value score-val score-anim">+' + scoreGain + '</div></div>' +
        '<div class="reward-item"><div class="reward-label">回合数</div><div class="reward-value exp-val score-anim">' + (battle.turn - 1) + ' 回合</div></div>';
      spawnGoldParticles();
      spawnVictoryFireworks();
    } else {
      panel.className = 'result-panel lose-panel';
      icon.textContent = '\u{1F494}';
      title.textContent = '战败...';
      title.className = 'result-title lose';
      subtitle.textContent = '不要气馁，调整策略再来挑战！';
      badgeReveal.style.display = 'none';
      badgeReveal.classList.remove('flip-reveal');
      var rewards2 = BATTLE_SYSTEM.getBattleRewards();
      var diffRewards2 = rewards2[battle.difficulty] || rewards2[1];
      var consolationScore = diffRewards2.loseScore;
      rewardsList.innerHTML =
        '<div class="reward-item"><div class="reward-label">安慰积分</div><div class="reward-value score-val score-anim">+' + consolationScore + '</div></div>';
    }
    updateNavInfo();
    showPhase('phase4');
  }

  // ===== 金色粒子特效 =====
  function spawnGoldParticles() {
    var container = document.createElement('div');
    container.className = 'particle-container';
    document.body.appendChild(container);
    for (var i = 0; i < 40; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (Math.random() * 100) + '%';
      p.style.top = (50 + Math.random() * 40) + '%';
      p.style.animationDelay = (Math.random() * 0.8) + 's';
      p.style.animationDuration = (1 + Math.random() * 1) + 's';
      var size = (4 + Math.random() * 6) + 'px';
      p.style.width = size;
      p.style.height = size;
      var colors = ['#f0c040', '#fb923c', '#fbbf24', '#fde68a'];
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      container.appendChild(p);
    }
    setTimeout(function() {
      if (container.parentNode) {
        container.parentNode.removeChild(container);
      }
    }, 2500);
  }

  // ===== 胜利烟花粒子效果 =====
  function spawnVictoryFireworks() {
    var container = document.createElement('div');
    container.className = 'victory-fireworks';
    document.body.appendChild(container);
    var colors = ['#f0c040', '#f87171', '#67e8f9', '#a78bfa', '#6ee7b7', '#fb923c', '#fbbf24', '#ec4899'];
    /* 生成多个烟花爆发点 */
    for (var burst = 0; burst < 5; burst++) {
      var cx = 15 + Math.random() * 70;
      var cy = 15 + Math.random() * 50;
      var burstDelay = burst * 0.3;
      for (var i = 0; i < 12; i++) {
        var p = document.createElement('div');
        p.className = 'firework-particle';
        var angle = (Math.PI * 2 / 12) * i + Math.random() * 0.3;
        var dist = 60 + Math.random() * 80;
        var fx = Math.cos(angle) * dist;
        var fy = Math.sin(angle) * dist - 30;
        p.style.left = cx + '%';
        p.style.top = cy + '%';
        p.style.setProperty('--fx', fx + 'px');
        p.style.setProperty('--fy', fy + 'px');
        p.style.animationDelay = burstDelay + 's';
        p.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        var size = (3 + Math.random() * 5) + 'px';
        p.style.width = size;
        p.style.height = size;
        container.appendChild(p);
      }
    }
    setTimeout(function() {
      if (container.parentNode) {
        container.parentNode.removeChild(container);
      }
    }, 3000);
  }

  // ===== 返回元素选择 =====
  window.goBackToPhase1 = function() {
    try {
      selectedElementId = null;
      selectedPetId = null;
      currentBattleId = null;
      isBattleAnimating = false;
      updateNavInfo();
      renderElements();
      showPhase('phase1');
    } catch(e) {
      console.error('goBackToPhase1 error:', e);
      alert('返回出错: ' + e.message);
    }
  };

  // ===== 继续挑战 =====
  window.continueChallenge = function() {
    try {
      selectedElementId = null;
      selectedPetId = null;
      currentBattleId = null;
      isBattleAnimating = false;
      updateNavInfo();
      renderElements();
      showPhase('phase1');
    } catch(e) {
      console.error('continueChallenge error:', e);
      alert('继续挑战出错: ' + e.message);
    }
  };

  // ===== 启动 =====
  init();
})();
</script>

</body>
</html>
