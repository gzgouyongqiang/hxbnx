<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>元素推断大师 | 化学不难学</title>
<style>
:root{--bg:#0a0e1a;--card:#11182b;--gold:#f0c040;--cyan:#67e8f9;--red:#f87171;--green:#6ee7b7;--purple:#a78bfa;--orange:#fb923c;--text:#e2e8f0;--muted:#94a3b8;--border:rgba(103,232,249,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* 顶部导航 */
.header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:24px;background:linear-gradient(90deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-link{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}
.back-link:hover{color:var(--gold)}

/* 统计栏 */
.stats-bar{display:flex;justify-content:center;gap:16px;padding:0 20px 16px;flex-wrap:wrap}
.stat-box{padding:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:10px;text-align:center;min-width:80px}
.stat-num{font-size:20px;font-weight:700;color:var(--gold)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}

/* 开始界面 */
.start-screen{max-width:600px;margin:40px auto;padding:0 20px;text-align:center}
.start-title{font-size:28px;font-weight:800;color:var(--gold);margin-bottom:12px}
.start-desc{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:30px}
.start-btn{background:linear-gradient(90deg,var(--gold),#d4a017);color:#000;border:none;border-radius:12px;padding:14px 40px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,192,64,.3)}

/* 游戏区域 */
.game-area{display:none;max-width:700px;margin:0 auto;padding:0 20px 40px}
.game-area.active{display:block}

/* 进度 */
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:var(--muted)}
.progress-bar{height:6px;background:rgba(255,255,255,.05);border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:3px;transition:width .5s}

/* 题目卡片 */
.question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.question-num{font-size:12px;color:var(--cyan);margin-bottom:8px}
.question-title{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:16px}

/* 线索列表 */
.clue-list{list-style:none;margin-bottom:20px}
.clue-list li{padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:14px;line-height:1.6;color:var(--text);display:flex;align-items:flex-start;gap:10px}
.clue-list li::before{content:'🔍';flex-shrink:0}

/* 选项 */
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.opt-btn{padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-size:15px;cursor:pointer;transition:all .2s;text-align:center;font-family:inherit}
.opt-btn:hover:not(.disabled){border-color:var(--cyan);background:rgba(103,232,249,.05);transform:translateY(-1px)}
.opt-btn.correct{border-color:var(--green);background:rgba(110,231,183,.1);color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
.opt-btn.disabled{cursor:not-allowed;opacity:.7}

/* 解析 */
.explanation{display:none;margin-top:16px;padding:16px;background:rgba(110,231,183,.05);border:1px solid rgba(110,231,183,.2);border-radius:10px}
.explanation.show{display:block}
.exp-title{font-size:14px;font-weight:700;color:var(--green);margin-bottom:8px}
.exp-text{font-size:13px;color:var(--text);line-height:1.8}

/* 下一题按钮 */
.next-btn-area{text-align:center;margin-top:20px}
.next-btn{background:linear-gradient(90deg,var(--gold),#d4a017);color:#000;border:none;border-radius:10px;padding:10px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* 结算界面 */
.result-screen{display:none;max-width:500px;margin:40px auto;padding:0 20px;text-align:center}
.result-screen.active{display:block}
.result-title{font-size:32px;font-weight:800;color:var(--gold);margin-bottom:8px}
.result-sub{font-size:14px;color:var(--muted);margin-bottom:24px}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.result-stat{padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.result-stat-num{font-size:28px;font-weight:700;color:var(--gold)}
.result-stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.result-btn{background:linear-gradient(90deg,var(--gold),#d4a017);color:#000;border:none;border-radius:12px;padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin:6px}

/* 连击提示 */
.combo-popup{position:fixed;top:20%;left:50%;transform:translateX(-50%) scale(0);padding:10px 24px;border-radius:20px;background:linear-gradient(90deg,var(--gold),var(--orange));color:#000;font-size:16px;font-weight:700;z-index:50;transition:transform .3s;pointer-events:none}
.combo-popup.show{transform:translateX(-50%) scale(1)}

/* 响应式 */
@media(max-width:600px){
  .header h1{font-size:20px}
  .options{grid-template-columns:1fr}
  .start-title{font-size:22px}
  .question-title{font-size:16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="index.html" class="back-link">← 返回首页</a>
    <span style="color:var(--border)">|</span>
    <h1>元素推断大师</h1>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-box"><div class="stat-num" id="scoreNum">0</div><div class="stat-label">积分</div></div>
  <div class="stat-box"><div class="stat-num" id="comboNum">0</div><div class="stat-label">连击</div></div>
  <div class="stat-box"><div class="stat-num" id="lifeNum">3</div><div class="stat-label">生命</div></div>
</div>

<!-- 开始界面 -->
<div class="start-screen" id="startScreen">
  <div class="start-title">元素推断大师</div>
  <div class="start-desc">
    根据给出的线索，推断是哪种元素。<br>
    涵盖原子序数1~36号元素、碱金属族和卤族元素。<br>
    答对得分，连续答对有连击加成！<br>
    共40题，3条生命，挑战你的元素知识！
  </div>
  <button class="start-btn" onclick="startGame()">开始挑战</button>
</div>

<!-- 游戏区域 -->
<div class="game-area" id="gameArea">
  <div class="progress-info">
    <span>第 <span id="currentQ">1</span> / <span id="totalQ">40</span> 题</span>
    <span>最高分连击: <span id="maxCombo">0</span></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="question-card">
    <div class="question-num" id="qNum">第 1 题</div>
    <div class="question-title" id="qTitle">根据以下线索，推断这是什么元素：</div>
    <ul class="clue-list" id="clueList"></ul>

    <div class="options" id="options"></div>

    <div class="explanation" id="explanation">
      <div class="exp-title">解析</div>
      <div class="exp-text" id="expText"></div>
    </div>

    <div class="next-btn-area" id="nextArea" style="display:none">
      <button class="next-btn" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>
</div>

<!-- 结算界面 -->
<div class="result-screen" id="resultScreen">
  <div class="result-title" id="resultTitle">挑战完成！</div>
  <div class="result-sub" id="resultSub"></div>
  <div class="result-stats">
    <div class="result-stat"><div class="result-stat-num" id="rScore">0</div><div class="result-stat-label">总积分</div></div>
    <div class="result-stat"><div class="result-stat-num" id="rCorrect">0</div><div class="result-stat-label">答对题数</div></div>
    <div class="result-stat"><div class="result-stat-num" id="rMaxCombo">0</div><div class="result-stat-label">最高连击</div></div>
    <div class="result-stat"><div class="result-stat-num" id="rAccuracy">0%</div><div class="result-stat-label">正确率</div></div>
  </div>
  <button class="result-btn" onclick="startGame()">再来一次</button>
  <a href="index.html" style="display:inline-block;margin-top:12px;color:var(--muted);text-decoration:none;font-size:14px">返回首页</a>
</div>

<!-- 连击提示 -->
<div class="combo-popup" id="comboPopup"></div>

<script src="assets/game.js"></script>

// ==================== 游戏状态 ====================
let gameState = {
  score: 0,
  combo: 0,
  maxCombo: 0,
  life: 3,
  currentQ: 0,
  correctCount: 0,
  questions: [],
  answered: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  gameState = {
    score: 0,
    combo: 0,
    maxCombo: 0,
    life: 3,
    currentQ: 0,
    correctCount: 0,
    questions: shuffle([...QUESTIONS]),
    answered: false
  };

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').classList.remove('active');
  document.getElementById('gameArea').classList.add('active');

  updateStats();
  showQuestion();
}

function updateStats() {
  document.getElementById('scoreNum').textContent = gameState.score;
  document.getElementById('comboNum').textContent = gameState.combo;
  document.getElementById('lifeNum').textContent = gameState.life;
  document.getElementById('currentQ').textContent = gameState.currentQ + 1;
  document.getElementById('totalQ').textContent = gameState.questions.length;
  document.getElementById('maxCombo').textContent = gameState.maxCombo;
}

function showQuestion() {
  const q = gameState.questions[gameState.currentQ];
  if (!q || gameState.life <= 0) {
    showResult();
    return;
  }

  gameState.answered = false;

  const progress = ((gameState.currentQ) / gameState.questions.length * 100);
  document.getElementById('progressFill').style.width = progress + '%';

  document.getElementById('qNum').textContent = `第 ${gameState.currentQ + 1} / ${gameState.questions.length} 题`;

  // 线索
  const clueList = document.getElementById('clueList');
  clueList.innerHTML = '';
  q.clues.forEach(clue => {
    const li = document.createElement('li');
    li.textContent = clue;
    clueList.appendChild(li);
  });

  // 选项
  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(idx);
    optionsDiv.appendChild(btn);
  });

  // 隐藏解析和下一题
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('nextArea').style.display = 'none';

  updateStats();
}

function checkAnswer(idx) {
  if (gameState.answered) return;
  gameState.answered = true;

  const q = gameState.questions[gameState.currentQ];
  const options = document.querySelectorAll('.opt-btn');
  const correctIdx = q.options.indexOf(q.answer);

  options.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correctIdx) {
      btn.classList.add('correct');
    } else if (i === idx && i !== correctIdx) {
      btn.classList.add('wrong');
    }
  });

  if (idx === correctIdx) {
    gameState.combo++;
    if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;

    // 基础分100 + 连击加成
    let points = 100;
    if (gameState.combo >= 3) points += 50;
    if (gameState.combo >= 5) points += 50;
    if (gameState.combo >= 10) points += 100;

    gameState.score += points;
    gameState.correctCount++;

    // 显示连击
    if (gameState.combo >= 3) {
      showComboPopup(gameState.combo + '连击！+' + points);
    }

    // 同步到总积分
    if (typeof HXBNX_GAME !== 'undefined') {
      HXBNX_GAME.addScore(points);
    }
  } else {
    gameState.combo = 0;
    gameState.life--;

    // 错题记录
    if (typeof HXBNX_GAME !== 'undefined') {
      HXBNX_GAME.addWrongQuestion({
        filename: 'element-guess',
        topicName: '元素推断',
        questionText: q.clues.join('；'),
        options: q.options,
        correctIndex: correctIdx,
        wrongIndex: idx
      });
    }
  }

  // 显示解析
  document.getElementById('expText').textContent = q.explanation;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('nextArea').style.display = 'block';

  updateStats();
}

function showComboPopup(text) {
  const popup = document.getElementById('comboPopup');
  popup.textContent = text;
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 1500);
}

function nextQuestion() {
  gameState.currentQ++;
  if (gameState.currentQ >= gameState.questions.length || gameState.life <= 0) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('gameArea').classList.remove('active');
  document.getElementById('resultScreen').classList.add('active');

  const total = gameState.questions.length;
  const accuracy = total > 0 ? Math.round(gameState.correctCount / total * 100) : 0;

  document.getElementById('rScore').textContent = gameState.score;
  document.getElementById('rCorrect').textContent = gameState.correctCount;
  document.getElementById('rMaxCombo').textContent = gameState.maxCombo;
  document.getElementById('rAccuracy').textContent = accuracy + '%';

  let title = '挑战完成！';
  if (accuracy >= 90) title = '元素大师！';
  else if (accuracy >= 70) title = '表现优秀！';
  else if (accuracy >= 50) title = '继续努力！';
  else title = '再接再厉！';
  document.getElementById('resultTitle').textContent = title;

  document.getElementById('resultSub').textContent =
    `共${total}题，答对${gameState.correctCount}题，正确率${accuracy}%`;

  // 同步副本通关积分
  if (typeof HXBNX_GAME !== 'undefined' && gameState.score > 0) {
    HXBNX_GAME.addSideScore('side-element-guess', gameState.score);
  }
}
