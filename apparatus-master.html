<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验装置识别大师 | 化学不难学</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 50%,#bae6fd 100%);min-height:100vh;color:#1e293b}
  .container{max-width:480px;margin:0 auto;padding:16px 12px 32px}
  
  /* 顶部导航 */
  .top-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .back-btn{color:#0369a1;text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px}
  .back-btn:hover{text-decoration:underline}
  
  /* 标题区 */
  .header{text-align:center;margin-bottom:16px}
  .header-icon{font-size:36px;margin-bottom:4px}
  .header h1{font-size:20px;font-weight:700;color:#0c4a6e;margin-bottom:2px}
  .header p{font-size:12px;color:#64748b}
  
  /* 模式选择 */
  .mode-select{display:flex;gap:10px;margin-bottom:16px}
  .mode-btn{flex:1;padding:14px 8px;border:2px solid #0ea5e9;border-radius:12px;background:white;cursor:pointer;transition:all .2s;text-align:center;font-size:13px;font-weight:600;color:#0c4a6e}
  .mode-btn:hover,.mode-btn.active{background:#0ea5e9;color:white;transform:translateY(-2px);box-shadow:0 4px 12px rgba(14,165,233,0.3)}
  .mode-btn .mode-icon{font-size:22px;display:block;margin-bottom:4px}
  
  /* 游戏区 */
  .game-area{background:white;border-radius:16px;padding:20px 16px;box-shadow:0 4px 16px rgba(0,0,0,0.08);display:none}
  .game-area.active{display:block}
  
  /* 进度条 */
  .progress-bar{height:6px;background:#e2e8f0;border-radius:3px;margin-bottom:12px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#0ea5e9,#0369a1);border-radius:3px;transition:width .3s}
  
  /* 题目计数 */
  .q-count{font-size:12px;color:#64748b;margin-bottom:8px;text-align:center}
  
  /* 计时器 */
  .timer{text-align:center;margin-bottom:10px}
  .timer-ring{width:72px;height:72px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;position:relative;color:#0c4a6e;background:conic-gradient(#0ea5e9 0deg,#e2e8f0 0deg);background:conic-gradient(from 0deg,#0ea5e9 var(--prog,360deg),#e2e8f0 var(--prog,360deg));transition:background .1s}
  .timer-ring span{background:white;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .timer.warning .timer-ring{color:#dc2626}
  .timer.warning .timer-ring{background:conic-gradient(from 0deg,#ef4444 var(--prog,360deg),#fee2e2 var(--prog,360deg))}
  
  /* 仪器图展示 */
  .apparatus-display{text-align:center;margin:16px 0;padding:16px;background:#f0f9ff;border-radius:12px;min-height:200px;display:flex;align-items:center;justify-content:center}
  .apparatus-display svg{max-width:100%;max-height:180px}
  
  /* 提示文字 */
  .hint{text-align:center;font-size:13px;color:#0369a1;margin-bottom:12px;min-height:20px}
  
  /* 选项 */
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .opt-btn{padding:14px 8px;border:2px solid #e2e8f0;border-radius:12px;background:white;cursor:pointer;font-size:14px;font-weight:500;color:#334155;transition:all .15s;text-align:center}
  .opt-btn:hover:not(.disabled){border-color:#0ea5e9;background:#f0f9ff;transform:translateY(-1px)}
  .opt-btn.correct{border-color:#16a34a!important;background:#dcfce7!important;color:#166534!important}
  .opt-btn.wrong{border-color:#dc2626!important;background:#fee2e2!important;color:#991b1b!important}
  .opt-btn.disabled{pointer-events:none;opacity:0.6}
  
  /* 等待超时作答提示 */
  .timeout-hint{text-align:center;font-size:12px;color:#f59e0b;margin-top:8px;min-height:18px}
  
  /* 得分弹出 */
  .score-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:800;pointer-events:none;animation:popUp 1s forwards;z-index:100}
  @keyframes popUp{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(1.5)}}
  
  /* 结果面板 */
  .result-panel{display:none;text-align:center;padding:24px 16px}
  .result-panel.active{display:block}
  .result-score{font-size:56px;font-weight:800;color:#0ea5e9;margin:12px 0}
  .result-detail{font-size:14px;color:#64748b;margin-bottom:16px}
  .result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
  .btn-primary{background:#0ea5e9;color:white}
  .btn-primary:hover{background:#0284c7;transform:translateY(-1px)}
  .btn-outline{background:white;color:#0ea5e9;border:2px solid #0ea5e9}
  .btn-outline:hover{background:#f0f9ff}
  
  /* 错题本 */
  .wrong-panel{display:none;margin-top:16px}
  .wrong-panel.active{display:block}
  .wrong-item{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px;margin-bottom:8px;font-size:13px;text-align:left}
  .wrong-item .q-text{font-weight:600;margin-bottom:4px;color:#991b1b}
  .wrong-item .q-answer{color:#374151}
  
  /* 响应式 */
  @media(max-width:400px){
    .options{grid-template-columns:1fr}
  }
</style>
</head>

<div class="container">
  <!-- 顶部 -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">← 返回练功房</a>
  </div>
  
  <!-- 标题 -->
  <div class="header">
    <div class="header-icon">🔬</div>
    <h1>实验装置识别大师</h1>
    <p>看图识仪器，实验不丢分</p>
  </div>
  
  <!-- 模式选择 -->
  <div class="mode-select">
    <div class="mode-btn active" onclick="startGame('normal')">
      <span class="mode-icon">🔍</span>
      认仪器
    </div>
    <div class="mode-btn" onclick="startGame('hard')">
      <span class="mode-icon">⚡</span>
      快闪模式
    </div>
  </div>
  
  <!-- 游戏区 -->
  <div class="game-area" id="gameArea">
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <div class="q-count" id="qCount"></div>
    <div class="timer" id="timer"><div class="timer-ring" id="timerRing"><span id="timeNum">20</span></div></div>
    <div class="hint" id="hint">请选择该仪器的名称</div>
    <div class="apparatus-display" id="appDisplay"></div>
    <div class="options" id="options"></div>
    <div class="timeout-hint" id="timeoutHint"></div>
  </div>
  
  <!-- 结果 -->
  <div class="result-panel" id="resultPanel">
    <div style="font-size:48px;margin-bottom:8px">🏆</div>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-btns">
      <button class="btn btn-primary" onclick="restartGame()">再来一局</button>
      <button class="btn btn-outline" onclick="showWrong()">查看错题</button>
      <button class="btn btn-outline" onclick="location.href='index.html'">返回首页</button>
    </div>
    <div class="wrong-panel" id="wrongPanel"></div>
  </div>
</div>

    answer: '冷凝管',
    options: ['冷凝管', '干燥管', '洗气瓶', '漏斗'],
    tip: '冷凝管冷水必须"下进上出"，保证外套充满冷水，冷凝效果好。'
  },
];

// ========== 游戏状态 ==========
let state = {
  mode: 'normal',       // normal | hard
  currentQ: 0,
  score: 0,
  streak: 0,
  timer: null,
  timeLeft: 20,
  answered: false,
  timeoutOccurred: false,
  wrongList: [],
  shuffled: [],
};

// ========== 工具函数 ==========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ========== 开始游戏 ==========
function startGame(mode) {
  state.mode = mode;
  state.currentQ = 0;
  state.score = 0;
  state.streak = 0;
  state.wrongList = [];
  state.timeLeft = mode === 'hard' ? 10 : 20;
  
  // 打乱题目顺序
  state.shuffled = shuffle(QUESTIONS);
  
  // UI切换
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.mode-btn').classList.add('active');
  document.getElementById('resultPanel').classList.remove('active');
  document.getElementById('gameArea').classList.add('active');
  
  loadQuestion();
}

// ========== 加载题目 ==========
function loadQuestion() {
  const q = state.shuffled[state.currentQ];
  state.answered = false;
  state.timeoutOccurred = false;
  
  // 更新进度
  const pct = (state.currentQ / state.shuffled.length * 100).toFixed(0);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('qCount').textContent = `第 ${state.currentQ + 1} / ${state.shuffled.length} 题`;
  
  // 显示仪器图
  document.getElementById('appDisplay').innerHTML = APPARATUS_SVGS[q.svgKey];
  document.getElementById('hint').textContent = '请选择该仪器的名称';
  document.getElementById('timeoutHint').textContent = '';
  
  // 打乱选项
  const shuffledOpts = shuffle(q.options);
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  shuffledOpts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(opt, btn);
    optDiv.appendChild(btn);
  });
  
  // 启动计时器
  startTimer();
}

// ========== 计时器 ==========
function startTimer() {
  clearInterval(state.timer);
  state.timeLeft = state.mode === 'hard' ? 10 : 20;
  updateTimerDisplay();
  
  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      onTimeout();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const maxTime = state.mode === 'hard' ? 10 : 20;
  const pct = (state.timeLeft / maxTime * 360).toFixed(0);
  const ring = document.getElementById('timerRing');
  const num = document.getElementById('timeNum');
  
  // conic gradient for circular progress
  const deg = (state.timeLeft / maxTime * 360).toFixed(0);
  ring.style.background = `conic-gradient(from 0deg, ${state.timeLeft <= 5 ? '#ef4444' : '#0ea5e9'} ${deg}deg, ${state.timeLeft <= 5 ? '#fee2e2' : '#e2e8f0'} ${deg}deg)`;
  num.textContent = state.timeLeft;
  
  // warning style
  if (state.timeLeft <= 5) {
    document.getElementById('timer').classList.add('warning');
  } else {
    document.getElementById('timer').classList.remove('warning');
  }
}

// ========== 超时处理 ==========
function onTimeout() {
  state.timeoutOccurred = true;
  document.getElementById('timeoutHint').textContent = '⏰ 时间到！答对得5分，答错不得分。请选择答案。';
  document.getElementById('timeoutHint').style.color = '#f59e0b';
  // 不自动跳转，等学生作答
}

// ========== 选择答案 ==========
function selectAnswer(selected, btnEl) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timer);
  
  const q = state.shuffled[state.currentQ];
  const isCorrect = (selected === q.answer);
  const maxTime = state.mode === 'hard' ? 10 : 20;
  const answeredInTime = state.timeLeft > 0;
  
  // 标记选项
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.add('disabled');
    if (b.textContent === q.answer) b.classList.add('correct');
    if (b.textContent === selected && !isCorrect) b.classList.add('wrong');
  });
  
  // 计分
  let pts = 0;
  if (isCorrect) {
    if (answeredInTime && !state.timeoutOccurred) {
      // 限时内答对：10分 + 连击加分
      pts = 10;
      state.streak++;
      if (state.streak >= 5) pts *= 3;
      else if (state.streak >= 3) pts *= 2;
    } else {
      // 超时后答对：5分
      pts = 5;
      state.streak = 0;
    }
    state.score += pts;
    showScorePopup(pts);
  } else {
    state.streak = 0;
    state.wrongList.push({ q: q, selected });
  }
  
  // 显示提示
  document.getElementById('hint').innerHTML = isCorrect
    ? `<span style="color:#16a34a">✅ 正确！${state.streak >= 3 ? '连击×' + Math.min(state.streak, 5) + '！' : ''}</span>`
    : `<span style="color:#dc2626">❌ 错误。正确答案：<strong>${q.answer}</strong></span>`;
  document.getElementById('timeoutHint').textContent = q.tip;
  document.getElementById('timeoutHint').style.color = '#0369a1';
  
  // 1.5秒后下一题
  setTimeout(() => {
    state.currentQ++;
    if (state.currentQ >= state.shuffled.length) {
      showResult();
    } else {
      loadQuestion();
    }
  }, 1500);
}

// ========== 得分弹出动画 ==========
function showScorePopup(pts) {
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+' + pts;
  popup.style.color = pts >= 20 ? '#f59e0b' : '#0ea5e9';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);
}

// ========== 显示结果 ==========
function showResult() {
  document.getElementById('gameArea').classList.remove('active');
  const panel = document.getElementById('resultPanel');
  panel.classList.add('active');
  
  document.getElementById('resultScore').textContent = state.score;
  
  const total = state.shuffled.length;
  const correct = state.shuffled.length - state.wrongList.length;
  document.getElementById('resultDetail').innerHTML =
    `共 ${total} 题，答对 ${correct} 题，答错 ${state.wrongList.length} 题`;
}

// ========== 重新开始 ==========
function restartGame() {
  document.getElementById('resultPanel').classList.remove('active');
  document.getElementById('wrongPanel').classList.remove('active');
  startGame(state.mode);
}

// ========== 查看错题 ==========
function showWrong() {
  const panel = document.getElementById('wrongPanel');
  if (panel.classList.contains('active')) {
    panel.classList.remove('active');
    return;
  }
  panel.classList.add('active');
  
  if (state.wrongList.length === 0) {
    panel.innerHTML = '<div style="text-align:center;color:#16a34a;padding:12px">🎉 没有错题！太棒了！</div>';
    return;
  }
  
  panel.innerHTML = state.wrongList.map((w, i) =>
    `<div class="wrong-item">
      <div class="q-text">${i + 1}. ${w.q.tip.split('。')[0]}</div>
      <div class="q-answer">你的答案：${w.selected} | 正确答案：<strong>${w.q.answer}</strong></div>
      <div style="color:#64748b;margin-top:4px;font-size:12px">${w.q.tip}</div>
    </div>`
  ).join('');
}
</script>
</body>
</html>
