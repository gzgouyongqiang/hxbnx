<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>模拟考试题 | 试题选讲 | 化学不难学</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f4f8;
            color: #0f172a;
            line-height: 1.7;
        }
        .navbar {
            background: linear-gradient(135deg, #4a044e 0%, #701a75 100%);
            padding: 0 24px; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .navbar a { color: #f5d0fe; text-decoration: none; font-size: 14px; opacity: 0.85; transition: opacity 0.2s; }
        .navbar a:hover { opacity: 1; }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            color: white; font-weight: 700; font-size: 16px; text-decoration: none;
        }
        .navbar-brand span { opacity: 0.6; font-weight: 400; font-size: 13px; }
        .navbar-links { display: flex; gap: 20px; }
        .page-header {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            padding: 40px 24px 32px; color: white;
        }
        .page-header-inner { max-width: 1200px; margin: 0 auto; }
        .page-breadcrumb { font-size: 13px; opacity: 0.8; margin-bottom: 12px; }
        .page-breadcrumb a { color: white; text-decoration: none; opacity: 0.8; }
        .page-breadcrumb a:hover { opacity: 1; }
        .page-title { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
        .page-desc { font-size: 14px; opacity: 0.85; }
        .main-layout {
            max-width: 1200px; margin: 0 auto;
            padding: 40px 24px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
            min-height: 50vh;
        }
        .sidebar { align-self: start; }
        .sidebar-title {
            font-size: 13px; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 1px;
            padding: 0 0 12px; margin-bottom: 8px;
            border-bottom: 2px solid #f1f5f9;
        }
        .cat-placeholder {
            padding: 20px 14px; text-align: center;
            color: #94a3b8; font-size: 13px;
            border: 2px dashed #e2e8f0; border-radius: 12px;
            line-height: 1.6;
        }
        .content { display: flex; align-items: center; justify-content: center; }
        .placeholder-card {
            text-align: center; padding: 60px 40px;
            background: white; border-radius: 20px;
            box-shadow: 0 4px 20px -4px rgba(0,0,0,0.06);
        }
        .placeholder-icon {
            font-size: 64px; margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .placeholder-title {
            font-size: 22px; font-weight: 800; color: #334155;
            margin-bottom: 10px;
        }
        .placeholder-desc {
            font-size: 15px; color: #94a3b8;
            max-width: 360px; margin: 0 auto; line-height: 1.7;
        }
        .placeholder-badge {
            display: inline-block; margin-top: 20px;
            padding: 8px 24px; border-radius: 20px;
            font-size: 14px; font-weight: 600;
            background: #fef3c7; color: #b45309;
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .page-title { font-size: 22px; }
            .navbar-links { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">
            🔬 化学不难学 <span>/ 高三化学备考</span>
        </a>
        <div class="navbar-links">
            <a href="../index.html">首页</a>
            <a href="xz.html">试题选讲</a>
        </div>
    </nav>
    <div class="page-header">
        <div class="page-header-inner">
            <div class="page-breadcrumb">
                <a href="../index.html">首页</a> &rsaquo;
                <a href="../index.html">试题选讲</a> &rsaquo;
                模拟考试题
            </div>
            <div class="page-title">📋 模拟考试题</div>
            <div class="page-desc">模拟试卷精选与精讲</div>
        </div>
    </div>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-title">试卷分类</div>
            <div class="cat-placeholder">
                分类正在规划中<br>后续会按地区、难度<br>等进行分类整理
            </div>
        </aside>
        <main class="content">
            <div class="placeholder-card">
                <div class="placeholder-icon">📋</div>
                <div class="placeholder-title">模拟考试题</div>
                <div class="placeholder-desc">模拟试卷精选精讲正在制作中，将提供完整的模拟考试训练与详细解析</div>
                <div class="placeholder-badge">🔧 内容筹备中</div>
            </div>
        </main>
    </div>
</body>
</html>
