<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>成就徽章墙 | 化学不难学</title>
    <link rel="stylesheet" href="./assets/game.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #fefcf6; --card: #ffffff; --text: #1e293b; --text-light: #64748b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

        .page-header {
            background: linear-gradient(135deg, #0a0a14 0%, #0f172a 50%, #0a0a14 100%);
            padding: 28px 24px 22px; color: #e2e8f0; position: relative; overflow: hidden;
        }
        .page-header::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(251,191,36,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 30%, rgba(124,58,237,0.1) 0%, transparent 45%);
            pointer-events: none;
        }
        .header-inner {
            max-width: 900px; margin: 0 auto; position: relative;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .header-back {
            color: #a78bfa; font-size: 14px; font-weight: 700; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .header-back:hover { color: #c4b5fd; }
        .header-title { font-size: 20px; font-weight: 800; color: #f0abfc; }
        .header-stat {
            background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.3);
            color: #fbbf24; padding: 4px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

        /* 进度条 */
        .ach-progress {
            background: #0f172a; border: 1px solid #1e293b; border-radius: 14px;
            padding: 20px 24px; margin-bottom: 24px;
        }
        .ach-progress-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
        }
        .ach-progress-title { font-size: 13px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
        .ach-progress-count { font-size: 22px; font-weight: 800; color: #fbbf24; }
        .ach-progress-count span { font-size: 13px; color: #64748b; font-weight: 400; }
        .ach-progress-track {
            height: 10px; background: #1e293b; border-radius: 5px; overflow: hidden;
        }
        .ach-progress-fill {
            height: 100%; border-radius: 5px; transition: width 0.8s ease;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
        }
        .ach-progress-exp {
            font-size: 12px; color: #64748b; margin-top: 8px;
        }
        .ach-progress-exp strong { color: #22d3ee; }

        /* 成就网格 */
        .ach-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }
        .ach-card {
            background: #0f172a; border: 1px solid #1e293b; border-radius: 14px;
            padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .ach-card.locked { opacity: 0.55; }
        .ach-card.unlocked {
            border-color: #fbbf24;
            background: rgba(251,191,36,0.03);
        }
        .ach-card.unlocked::before {
            content: ""; position: absolute; top: -30px; right: -30px;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(251,191,36,0.06);
        }

        .ach-icon-box {
            width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; position: relative; z-index: 1;
        }
        .ach-card.locked .ach-icon-box {
            background: #1e293b; filter: grayscale(1) opacity(0.4);
        }
        .ach-card.unlocked .ach-icon-box {
            background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(245,158,11,0.15));
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .ach-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
        .ach-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
        .ach-card.locked .ach-name { color: #475569; }
        .ach-card.unlocked .ach-name { color: #fbbf24; }
        .ach-desc { font-size: 12px; margin-bottom: 6px; }
        .ach-card.locked .ach-desc { color: #334155; }
        .ach-card.unlocked .ach-desc { color: #94a3b8; }
        .ach-exp { font-size: 11px; }
        .ach-card.locked .ach-exp { color: #334155; }
        .ach-card.unlocked .ach-exp { color: #10b981; font-weight: 600; }

        /* 解锁闪光动画 */
        .ach-card.just-unlocked {
            animation: unlockFlash 0.8s ease;
        }
        @keyframes unlockFlash {
            0% { transform: scale(0.95); border-color: #1e293b; }
            50% { transform: scale(1.03); border-color: #fbbf24; box-shadow: 0 0 30px rgba(251,191,36,0.3); }
            100% { transform: scale(1); }
        }

        .footer { text-align: center; padding: 20px 16px 28px; color: #64748b; font-size: 12px; }

        @media (max-width: 640px) {
            .ach-grid { grid-template-columns: 1fr; }
            .header-inner { gap: 10px; }
            .header-title { font-size: 17px; }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="header-inner">
            <a href="./index.html" class="header-back">⚔️ 炼金主城</a>
            <span class="header-title">🏅 成就徽章墙</span>
            <span class="header-stat" id="ach-stat">0/0</span>
        </div>
    </header>

    <div class="container">
        <div class="ach-progress" id="ach-progress"></div>
        <div class="ach-grid" id="ach-grid"></div>
    </div>

    <footer class="footer">
        <p>成就徽章墙 · 化学不难学</p>
    </footer>

    <script src="./assets/game.js"></script>
    <script>
    function renderAchievements() {
        var status = HXBNX_GAME.getStatus();
        var achs = status.achievements;
        var unlocked = status.achievementsCount;
        var total = achs.length;
        var totalExp = 0;
        var unlockedExp = 0;
        achs.forEach(function(a) {
            totalExp += a.exp;
            if (status.state.unlockedAchievements.indexOf(a.id) !== -1) {
                unlockedExp += a.exp;
            }
        });

        // 顶部进度
        document.getElementById('ach-stat').textContent = unlocked + '/' + total + ' 已解锁';
        var pct = total > 0 ? Math.round(unlocked / total * 100) : 0;
        document.getElementById('ach-progress').innerHTML =
            '<div class="ach-progress-header">' +
            '<div class="ach-progress-title">徽章收集进度</div>' +
            '<div class="ach-progress-count">' + unlocked + ' <span>/ ' + total + '</span></div>' +
            '</div>' +
            '<div class="ach-progress-track"><div class="ach-progress-fill" style="width:' + pct + '%"></div></div>' +
            '<div class="ach-progress-exp">成就经验值 <strong>' + unlockedExp + '</strong> / ' + totalExp + ' EXP</div>';

        // 徽章网格
        var gridEl = document.getElementById('ach-grid');
        var html = '';
        achs.forEach(function(a) {
            var isUnlocked = status.state.unlockedAchievements.indexOf(a.id) !== -1;
            var cls = isUnlocked ? 'unlocked' : 'locked';
            html += '<div class="ach-card ' + cls + '">';
            html += '<div class="ach-icon-box">' + a.icon + '</div>';
            html += '<div class="ach-info">';
            html += '<div class="ach-name">' + a.name + '</div>';
            html += '<div class="ach-desc">' + a.desc + '</div>';
            html += '<div class="ach-exp">' + (isUnlocked ? '✅ +' + a.exp + ' EXP' : '🔒 ' + a.exp + ' EXP') + '</div>';
            html += '</div>';
            html += '</div>';
        });
        gridEl.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', renderAchievements);
    </script>
</body>
</html>
